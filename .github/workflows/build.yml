name: Build and Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      arch:
        type: choice
        description: 构建架构（tag 推送时始终构建所有架构）
        options:
          - all
          - both
          - x64
          - arm64
        default: both

env:
  NODE_VERSION: '22'
  NODE_LTS: '22.14.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ARCH="${{ github.event.inputs.arch }}"
          else
            ARCH="both"
          fi
          case "$ARCH" in
            all)  echo 'matrix={"include":[{"target":"x86_64-pc-windows-msvc","arch":"x64","node-platform":"win-x64"},{"target":"aarch64-pc-windows-msvc","arch":"arm64","node-platform":"win-arm64"}]}' ;;
            both) echo 'matrix={"include":[{"target":"x86_64-pc-windows-msvc","arch":"x64","node-platform":"win-x64"}]}' ;;
            x64)  echo 'matrix={"include":[{"target":"x86_64-pc-windows-msvc","arch":"x64","node-platform":"win-x64"}]}' ;;
            arm64) echo 'matrix={"include":[{"target":"aarch64-pc-windows-msvc","arch":"arm64","node-platform":"win-arm64"}]}' ;;
          esac >> "$GITHUB_OUTPUT"

  build:
    needs: prep
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prep.outputs.matrix) }}

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Get version
        shell: bash
        id: version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        shell: bash
        run: npm install -g pnpm@11.3.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        # 使用项目本地 Prisma（在 pnpm monorepo 中，npx 找不到 server/ 下的 bin）
        run: pnpm --filter classnode-server db:generate

      - name: Build frontend
        run: pnpm build

      - name: Build server
        run: pnpm build:server

      - name: Bundle server into Tauri resources
        shell: bash
        run: |
          mkdir -p src-tauri/resources/server

          cp -r server/dist src-tauri/resources/server/dist
          cp -r server/prisma src-tauri/resources/server/prisma
          cp -r server/changelogs src-tauri/resources/server/changelogs
          cp server/package.json src-tauri/resources/server/
          cp server/.env.example src-tauri/resources/server/.env

          # 打包前端静态文件（由 Express 服务器承载）
          rm -rf src-tauri/resources/server/frontend
          cp -r out src-tauri/resources/server/frontend

          cd src-tauri/resources/server
          npm install --production --ignore-scripts

          mkdir -p node_modules
          cp -rL ../../../server/node_modules/@prisma/client node_modules/@prisma/
          PRISMA_REAL=$(cd ../../../server/node_modules/@prisma/client && pwd -P)
          PRISMA_DIR="$(dirname "$(dirname "$PRISMA_REAL")")/.prisma"
          if [ -d "$PRISMA_DIR" ]; then
            cp -rL "$PRISMA_DIR" node_modules/
          else
            echo "WARNING: .prisma not found at $PRISMA_DIR"
          fi

          # 复制 prisma CLI（用于应用启动时自动同步 schema）
          cp -rL ../../../server/node_modules/prisma node_modules/
          echo "Prisma CLI bundled."

          echo "=== Server bundle contents ==="
          ls -la dist/
          echo "=== Prisma client ==="
          ls node_modules/.prisma/client/ 2>/dev/null || echo "No .prisma/client"

          # 初始化数据库（创建表结构）
          echo "Creating database tables..."
          rm -f prisma/dev.db
          ../../../server/node_modules/.bin/prisma db push --accept-data-loss
          echo "Database initialized at prisma/dev.db"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Download portable Node.js
        shell: bash
        run: |
          NODE_FILENAME="node-v${NODE_LTS}-${{ matrix.node-platform }}"
          NODE_URL="https://nodejs.org/dist/v${NODE_LTS}/${NODE_FILENAME}.zip"
          echo "Downloading: $NODE_URL"
          curl -fsSL "$NODE_URL" -o download.zip

          mkdir -p src-tauri/resources/server
          7z x download.zip -o"node-extracted"
          cp "node-extracted/${NODE_FILENAME}/node.exe" src-tauri/resources/server/
          rm -rf download.zip node-extracted

          echo "Node.js binary bundled at src-tauri/resources/server/"

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Rename Windows installers
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          VERSION="${{ steps.version.outputs.version }}"
          ARCH="${{ matrix.arch }}"

          # 统一重命名标准：ClassNode_{VERSION}_windows_{ARCH}-setup.exe / .msi
          # Tauri 输出的原始文件名架构标识不确定（arm64/aarch64 等），
          # 故不依赖匹配具体架构模式，而是找出所有不带 _windows_ 前缀的文件进行重命名

          # 重命名 NSIS 安装程序
          NSIS_DIR="$BUNDLE_DIR/nsis"
          if ls "$NSIS_DIR"/ClassNode_*.exe 1>/dev/null 2>&1; then
            for f in "$NSIS_DIR"/ClassNode_*.exe; do
              base=$(basename "$f")
              target="$NSIS_DIR/ClassNode_${VERSION}_windows_${ARCH}-setup.exe"
              if [[ "$base" != *"_windows_"* ]]; then
                rm -f "$target"
                mv "$f" "$target"
                echo "Renamed: $base → ClassNode_${VERSION}_windows_${ARCH}-setup.exe"
              fi
            done
          fi

          # 重命名 MSI 安装程序
          MSI_DIR="$BUNDLE_DIR/msi"
          if ls "$MSI_DIR"/ClassNode_*.msi 1>/dev/null 2>&1; then
            for f in "$MSI_DIR"/ClassNode_*.msi; do
              base=$(basename "$f")
              case "$ARCH" in
                x64)   archSuffix="x64" ;;
                arm64) archSuffix="arm64" ;;
              esac
              target="$MSI_DIR/ClassNode_${VERSION}_windows_${archSuffix}.msi"
              if [[ "$base" != *"_windows_"* ]]; then
                rm -f "$target"
                mv "$f" "$target"
                echo "Renamed MSI: $base → ClassNode_${VERSION}_windows_${archSuffix}.msi"
              fi
            done
          fi

          # 清理残留：确保没有不带 _windows_ 前缀的旧文件留在构建目录中
          for dir in "$NSIS_DIR" "$MSI_DIR"; do
            [ -d "$dir" ] || continue
            for f in "$dir"/ClassNode_*.exe "$dir"/ClassNode_*.msi; do
              [ -f "$f" ] || continue
              base=$(basename "$f")
              if [[ "$base" != *"_windows_"* ]]; then
                rm -f "$f"
                echo "Cleaned up leftover: $base"
              fi
            done
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ClassNode-v${{ steps.version.outputs.version }}-win-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/
          if-no-files-found: error

  release:
    needs: [ build ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Get version from package.json
        shell: bash
        id: version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v5
        with:
          pattern: ClassNode-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ClassNode v${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}
          draft: ${{ !startsWith(github.ref, 'refs/tags/') }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: |
            **/*.dmg
            **/*.msi
            **/*.exe
            **/*.AppImage
            **/*.deb
          generate_release_notes: true
          fail_on_unmatched_files: false
