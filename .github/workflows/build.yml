name: Build and Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  NODE_LTS: '22.14.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        bundle-node: [true, false]

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        shell: bash
        run: npm install -g pnpm@11.3.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: cd server && npx prisma generate

      - name: Build frontend
        run: pnpm build

      - name: Build server
        run: pnpm build:server

      - name: Bundle server into Tauri resources
        shell: bash
        run: |
          mkdir -p src-tauri/resources/server

          cp -r server/dist src-tauri/resources/server/dist
          cp -r server/prisma src-tauri/resources/server/prisma
          cp server/package.json src-tauri/resources/server/
          cp server/.env.example src-tauri/resources/server/.env

          # 打包前端静态文件（由 Express 服务器承载）
          cp -r out src-tauri/resources/server/frontend

          cd src-tauri/resources/server
          npm install --production --ignore-scripts

          mkdir -p node_modules
          cp -rL ../../../server/node_modules/@prisma/client node_modules/@prisma/
          PRISMA_REAL=$(cd ../../../server/node_modules/@prisma/client && pwd -P)
          PRISMA_DIR="$(dirname "$(dirname "$PRISMA_REAL")")/.prisma"
          if [ -d "$PRISMA_DIR" ]; then
            cp -rL "$PRISMA_DIR" node_modules/
          else
            echo "WARNING: .prisma not found at $PRISMA_DIR"
          fi

          echo "=== Server bundle contents ==="
          ls -la dist/
          echo "=== Prisma client ==="
          ls node_modules/.prisma/client/ 2>/dev/null || echo "No .prisma/client"

          # 初始化数据库（创建表结构）
          echo "Creating database tables..."
          ../../../server/node_modules/.bin/prisma db push --accept-data-loss
          echo "Database initialized."

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Download portable Node.js
        if: matrix.bundle-node == true
        shell: bash
        run: |
          NODE_FILENAME="node-v${NODE_LTS}-win-x64"
          NODE_URL="https://nodejs.org/dist/v${NODE_LTS}/${NODE_FILENAME}.zip"
          echo "Downloading: $NODE_URL"
          curl -fsSL "$NODE_URL" -o download.zip

          mkdir -p src-tauri/resources/server
          7z x download.zip -o"node-extracted"
          cp "node-extracted/${NODE_FILENAME}/node.exe" src-tauri/resources/server/
          rm -rf download.zip node-extracted

          echo "Node.js binary bundled at src-tauri/resources/server/"

      - name: Build Tauri app
        run: pnpm tauri build --target x86_64-pc-windows-msvc
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ClassNode-win-x64${{ matrix.bundle-node && '-with-node' || '' }}
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: ClassNode-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.dmg
            **/*.msi
            **/*.exe
            **/*.AppImage
            **/*.deb
          generate_release_notes: true
