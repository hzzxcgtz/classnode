<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" rx="12" fill="#f4f4f5"/>
  <!-- 窗口标题栏 -->
  <rect x="0" y="0" width="800" height="40" rx="12" fill="#e4e4e7"/>
  <rect x="0" y="20" width="800" height="20" fill="#e4e4e7"/>
  <circle cx="20" cy="20" r="5" fill="#ff5f57"/>
  <circle cx="38" cy="20" r="5" fill="#febc2e"/>
  <circle cx="56" cy="20" r="5" fill="#28c840"/>
  <!-- 顶栏 -->
  <rect x="0" y="40" width="800" height="56" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <text x="24" y="76" font-family="system-ui" font-size="16" font-weight="600" fill="#0a0a0a">课堂互动 · 高二(3)班</text>
  <rect x="600" y="52" width="80" height="32" rx="8" fill="#10b981"/>
  <text x="640" y="73" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="500" fill="#ffffff">运行中</text>
  <rect x="692" y="52" width="80" height="32" rx="8" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="1"/>
  <text x="732" y="73" text-anchor="middle" font-family="system-ui" font-size="13" fill="#0a0a0a">结束</text>
  <!-- 左侧 - 对话区 -->
  <rect x="0" y="96" width="560" height="404" fill="#fafafa"/>
  <!-- 对话气泡 -->
  <rect x="16" y="116" width="380" height="48" rx="12" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <circle cx="32" cy="128" r="10" fill="#2563eb"/>
  <text x="32" y="133" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">S</text>
  <text x="52" y="132" font-family="system-ui" font-size="13" font-weight="500" fill="#0a0a0a">学生 A</text>
  <text x="52" y="150" font-family="system-ui" font-size="12" fill="#52525b">这道题的解题思路是什么？</text>
  <!-- AI 回复 -->
  <rect x="80" y="176" width="400" height="66" rx="12" fill="#dbeafe"/>
  <circle cx="96" cy="190" r="10" fill="#7c3aed"/>
  <text x="96" y="195" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">AI</text>
  <text x="116" y="194" font-family="system-ui" font-size="13" font-weight="500" fill="#0a0a0a">英语口语助手</text>
  <text x="96" y="214" font-family="system-ui" font-size="12" fill="#52525b">我们可以从以下几个角度分析这道题...</text>
  <text x="96" y="232" font-family="system-ui" font-size="12" fill="#52525b">首先...（持续输入中）</text>
  <!-- 更多对话 -->
  <rect x="16" y="254" width="240" height="40" rx="12" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <circle cx="32" cy="266" r="10" fill="#2563eb"/>
  <text x="32" y="271" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">B</text>
  <text x="52" y="270" font-family="system-ui" font-size="13" font-weight="500" fill="#0a0a0a">学生 B</text>
  <text x="52" y="286" font-family="system-ui" font-size="12" fill="#52525b">原来是这样，谢谢！</text>
  <!-- 输入框 -->
  <rect x="10" y="460" width="540" height="34" rx="8" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <text x="24" y="482" font-family="system-ui" font-size="13" fill="#a1a1aa">输入消息...</text>
  <rect x="504" y="463" width="36" height="28" rx="6" fill="#2563eb"/>
  <path d="M518 477 h8 M522 473 v8" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <!-- 右侧 - 学生面板 -->
  <rect x="560" y="96" width="240" height="404" fill="#ffffff"/>
  <text x="580" y="126" font-family="system-ui" font-size="13" font-weight="600" fill="#0a0a0a">在线学生 (24)</text>
  <!-- 学生列表 -->
  <rect x="572" y="140" width="216" height="36" rx="8" fill="#f4f4f5"/>
  <circle cx="584" cy="153" r="8" fill="#2563eb"/>
  <text x="584" y="157" text-anchor="middle" font-family="system-ui" font-size="7" fill="#ffffff">A</text>
  <text x="600" y="158" font-family="system-ui" font-size="13" fill="#0a0a0a">学生 A</text>
  <text x="764" y="158" text-anchor="end" font-family="system-ui" font-size="11" fill="#10b981">活跃</text>
  <rect x="572" y="180" width="216" height="36" rx="8" fill="#ffffff"/>
  <circle cx="584" cy="193" r="8" fill="#f97316"/>
  <text x="584" y="197" text-anchor="middle" font-family="system-ui" font-size="7" fill="#ffffff">B</text>
  <text x="600" y="198" font-family="system-ui" font-size="13" fill="#0a0a0a">学生 B</text>
  <text x="764" y="198" text-anchor="end" font-family="system-ui" font-size="11" fill="#52525b">等待中</text>
  <rect x="572" y="220" width="216" height="36" rx="8" fill="#ffffff"/>
  <circle cx="584" cy="233" r="8" fill="#10b981"/>
  <text x="584" y="237" text-anchor="middle" font-family="system-ui" font-size="7" fill="#ffffff">C</text>
  <text x="600" y="238" font-family="system-ui" font-size="13" fill="#0a0a0a">学生 C</text>
  <text x="764" y="238" text-anchor="end" font-family="system-ui" font-size="11" fill="#10b981">活跃</text>
  <rect x="572" y="260" width="216" height="36" rx="8" fill="#ffffff"/>
  <circle cx="584" cy="273" r="8" fill="#a1a1aa"/>
  <text x="584" y="277" text-anchor="middle" font-family="system-ui" font-size="7" fill="#ffffff">D</text>
  <text x="600" y="278" font-family="system-ui" font-size="13" fill="#52525b">学生 D</text>
  <text x="764" y="278" text-anchor="end" font-family="system-ui" font-size="11" fill="#a1a1aa">离线</text>
</svg>