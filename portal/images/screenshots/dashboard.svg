<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <filter id="shadow-sm" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000008"/>
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#0000000a"/>
    </filter>

    <!-- Card gradients -->
    <linearGradient id="cardBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="cardPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="cardGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="cardOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>

    <!-- Chart area gradient -->
    <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.02"/>
    </linearGradient>
    <!-- Chart line gradient -->
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <!-- ============ Background & Window Chrome ============ -->
  <rect width="800" height="500" rx="12" fill="#f4f4f5"/>
  <rect x="0" y="0" width="800" height="40" rx="12" fill="#e4e4e7"/>
  <rect x="0" y="20" width="800" height="20" fill="#e4e4e7"/>
  <circle cx="20" cy="20" r="5" fill="#ff5f57"/>
  <circle cx="38" cy="20" r="5" fill="#febc2e"/>
  <circle cx="56" cy="20" r="5" fill="#28c840"/>

  <!-- ============ Top Navbar ============ -->
  <rect x="0" y="40" width="800" height="52" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <text x="24" y="72" font-family="system-ui" font-size="15" font-weight="600" fill="#18181b">仪表盘</text>
  <text x="96" y="72" font-family="system-ui" font-size="12" fill="#a1a1aa">今日概览 · 更新于 15:30</text>
  <rect x="708" y="52" width="68" height="28" rx="6" fill="#fafafa" stroke="#e4e4e7" stroke-width="1"/>
  <text x="742" y="71" text-anchor="middle" font-family="system-ui" font-size="12" fill="#52525b">刷新</text>

  <!-- ============ Row 1: 四个核心指标卡片 ============ -->
  <!-- 卡片 1: 在线课堂 -->
  <rect x="16" y="108" width="186" height="98" rx="10" fill="url(#cardBlue)" filter="url(#shadow)"/>
  <text x="109" y="150" text-anchor="middle" font-family="system-ui" font-size="38" font-weight="700" fill="#ffffff">24</text>
  <text x="109" y="173" text-anchor="middle" font-family="system-ui" font-size="12" fill="#bfdbfe">当前在线课堂</text>
  <path d="M62 186 L72 180 L82 184 L92 176 L102 182 L112 172 L122 178" stroke="#93c5fd" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="148" y="190" font-family="system-ui" font-size="11" fill="#bfdbfe">+3</text>

  <!-- 卡片 2: 对话轮次 -->
  <rect x="214" y="108" width="186" height="98" rx="10" fill="url(#cardPurple)" filter="url(#shadow)"/>
  <text x="314" y="150" text-anchor="middle" font-family="system-ui" font-size="38" font-weight="700" fill="#ffffff">186</text>
  <text x="314" y="173" text-anchor="middle" font-family="system-ui" font-size="12" fill="#ddd6fe">今日对话轮次</text>
  <path d="M260 186 L270 178 L280 182 L290 174 L300 180 L310 168 L320 176" stroke="#c4b5fd" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="346" y="190" font-family="system-ui" font-size="11" fill="#ddd6fe">+8%</text>

  <!-- 卡片 3: 智能体在线 -->
  <rect x="412" y="108" width="186" height="98" rx="10" fill="url(#cardGreen)" filter="url(#shadow)"/>
  <text x="510" y="150" text-anchor="middle" font-family="system-ui" font-size="38" font-weight="700" fill="#ffffff">8</text>
  <text x="495" y="150" text-anchor="end" font-family="system-ui" font-size="18" font-weight="400" fill="#a7f3d0">/12</text>
  <text x="510" y="173" text-anchor="middle" font-family="system-ui" font-size="12" fill="#a7f3d0">智能体在线</text>
  <rect x="465" y="184" width="80" height="4" rx="2" fill="#065f46" opacity="0.4"/>
  <rect x="465" y="184" width="53" height="4" rx="2" fill="#6ee7b7"/>

  <!-- 卡片 4: 系统健康度 -->
  <rect x="610" y="108" width="174" height="98" rx="10" fill="url(#cardOrange)" filter="url(#shadow)"/>
  <text x="702" y="150" text-anchor="middle" font-family="system-ui" font-size="38" font-weight="700" fill="#ffffff">98</text>
  <text x="719" y="150" font-family="system-ui" font-size="18" font-weight="400" fill="#fed7aa">%</text>
  <text x="702" y="173" text-anchor="middle" font-family="system-ui" font-size="12" fill="#fed7aa">系统健康度</text>
  <circle cx="688" cy="190" r="4" fill="#86efac"/>
  <text x="699" y="194" font-family="system-ui" font-size="11" fill="#fed7aa">服务正常</text>

  <!-- ============ Row 2: 图表区域 ============ -->
  <!-- 左侧：对话活跃趋势（面积图） -->
  <rect x="16" y="220" width="456" height="194" rx="10" fill="#ffffff" stroke="#e4e4e7" stroke-width="1" filter="url(#shadow)"/>
  <text x="36" y="250" font-family="system-ui" font-size="14" font-weight="600" fill="#18181b">对话活跃趋势</text>
  <text x="136" y="250" font-family="system-ui" font-size="11" fill="#a1a1aa">今日逐时</text>

  <!-- 网格线 -->
  <line x1="64" y1="270" x2="64" y2="396" stroke="#f4f4f5" stroke-width="1"/>
  <line x1="128" y1="270" x2="128" y2="396" stroke="#f4f4f5" stroke-width="1"/>
  <line x1="192" y1="270" x2="192" y2="396" stroke="#f4f4f5" stroke-width="1"/>
  <line x1="256" y1="270" x2="256" y2="396" stroke="#f4f4f5" stroke-width="1"/>
  <line x1="320" y1="270" x2="320" y2="396" stroke="#f4f4f5" stroke-width="1"/>
  <line x1="384" y1="270" x2="384" y2="396" stroke="#f4f4f5" stroke-width="1"/>
  <line x1="448" y1="270" x2="448" y2="396" stroke="#f4f4f5" stroke-width="1"/>

  <!-- Y 轴标签 -->
  <text x="56" y="396" text-anchor="end" font-family="system-ui" font-size="10" fill="#a1a1aa">0</text>
  <text x="56" y="354" text-anchor="end" font-family="system-ui" font-size="10" fill="#a1a1aa">10</text>
  <text x="56" y="312" text-anchor="end" font-family="system-ui" font-size="10" fill="#a1a1aa">20</text>
  <text x="56" y="270" text-anchor="end" font-family="system-ui" font-size="10" fill="#a1a1aa">30</text>

  <!-- X 轴标签 -->
  <text x="64" y="410" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a1a1aa">8:00</text>
  <text x="128" y="410" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a1a1aa">9:00</text>
  <text x="192" y="410" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a1a1aa">10:00</text>
  <text x="256" y="410" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a1a1aa">11:00</text>
  <text x="320" y="410" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a1a1aa">14:00</text>
  <text x="384" y="410" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a1a1aa">15:00</text>
  <text x="448" y="410" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a1a1aa">16:00</text>

  <!-- 面积图区域填充 -->
  <!-- 数据: 8:00=6, 9:00=14, 10:00=20, 11:00=16, 14:00=24, 15:00=30, 16:00=22 -->
  <!-- y = 396 - (val/35)*126 -->
  <path d="M64 374.4 L128 345.6 L192 324 L256 338.4 L320 309.6 L384 288 L448 316.8 L448 396 L64 396 Z" fill="url(#areaFill)"/>

  <!-- 面积图折线 + 数据点 -->
  <path d="M64 374.4 L128 345.6 L192 324 L256 338.4 L320 309.6 L384 288 L448 316.8" stroke="url(#lineGrad)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="64" cy="374.4" r="3.5" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="128" cy="345.6" r="3.5" fill="#ffffff" stroke="#6366f1" stroke-width="2"/>
  <circle cx="192" cy="324" r="3.5" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="256" cy="338.4" r="3.5" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/>
  <circle cx="320" cy="309.6" r="3.5" fill="#ffffff" stroke="#a855f7" stroke-width="2"/>
  <circle cx="384" cy="288" r="4" fill="#ffffff" stroke="#ec4899" stroke-width="2.5"/>
  <circle cx="448" cy="316.8" r="3.5" fill="#ffffff" stroke="#f472b6" stroke-width="2"/>

  <!-- 峰值标注 -->
  <rect x="370" y="272" width="30" height="16" rx="4" fill="#ec4899"/>
  <text x="385" y="284" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="600" fill="#ffffff">峰值</text>

  <!-- 右侧：智能体调用分布（环形图） -->
  <rect x="484" y="220" width="300" height="194" rx="10" fill="#ffffff" stroke="#e4e4e7" stroke-width="1" filter="url(#shadow)"/>
  <text x="504" y="250" font-family="system-ui" font-size="14" font-weight="600" fill="#18181b">智能体调用分布</text>
  <text x="606" y="250" font-family="system-ui" font-size="11" fill="#a1a1aa">今日占比</text>

  <!-- 环形图 segments (r=46, C≈289.03) -->
  <!-- 英语口语 35%: 289.03*0.35=101.16 -->
  <circle cx="590" cy="323" r="46" fill="none" stroke="#2563eb" stroke-width="20" stroke-dasharray="101.16 187.87" transform="rotate(-90 590 323)"/>
  <!-- 数学解题 28%: 289.03*0.28=80.93, 起始角度 -90+126=36° -->
  <circle cx="590" cy="323" r="46" fill="none" stroke="#7c3aed" stroke-width="20" stroke-dasharray="80.93 208.10" transform="rotate(36 590 323)"/>
  <!-- 作文批改 20%: 289.03*0.20=57.81, 起始角度 -90+226.8=136.8° -->
  <circle cx="590" cy="323" r="46" fill="none" stroke="#f472b6" stroke-width="20" stroke-dasharray="57.81 231.22" transform="rotate(136.8 590 323)"/>
  <!-- 其他 17%: 289.03*0.17=49.14, 起始角度 -90+298.8=208.8° -->
  <circle cx="590" cy="323" r="46" fill="none" stroke="#f97316" stroke-width="20" stroke-dasharray="49.14 239.89" transform="rotate(208.8 590 323)"/>

  <!-- 环形中心 -->
  <circle cx="590" cy="323" r="32" fill="#ffffff"/>
  <text x="590" y="320" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="700" fill="#18181b">186</text>
  <text x="590" y="335" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a1a1aa">总轮次</text>

  <!-- 图例 -->
  <rect x="650" y="278" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="668" y="288" font-family="system-ui" font-size="12" fill="#52525b">英语口语 35%</text>
  <rect x="650" y="302" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="668" y="312" font-family="system-ui" font-size="12" fill="#52525b">数学解题 28%</text>
  <rect x="650" y="326" width="10" height="10" rx="2" fill="#f472b6"/>
  <text x="668" y="336" font-family="system-ui" font-size="12" fill="#52525b">作文批改 20%</text>
  <rect x="650" y="350" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="668" y="360" font-family="system-ui" font-size="12" fill="#52525b">其他 17%</text>

  <!-- ============ Row 3: 最近课堂 ============ -->
  <rect x="16" y="426" width="768" height="54" rx="10" fill="#ffffff" stroke="#e4e4e7" stroke-width="1" filter="url(#shadow-sm)"/>
  <text x="36" y="454" font-family="system-ui" font-size="13" font-weight="600" fill="#18181b">最近课堂</text>

  <circle cx="36" cy="468" r="4" fill="#10b981"/>
  <text x="48" y="472" font-family="system-ui" font-size="11" fill="#52525b">高一(2)班</text>
  <rect x="128" y="463" width="28" height="12" rx="4" fill="#dcfce7"/>
  <text x="142" y="472" text-anchor="middle" font-family="system-ui" font-size="8" fill="#16a34a">互动中</text>

  <circle cx="190" cy="468" r="4" fill="#10b981"/>
  <text x="202" y="472" font-family="system-ui" font-size="11" fill="#52525b">高二(3)班</text>
  <rect x="282" y="463" width="28" height="12" rx="4" fill="#dcfce7"/>
  <text x="296" y="472" text-anchor="middle" font-family="system-ui" font-size="8" fill="#16a34a">互动中</text>

  <circle cx="344" cy="468" r="4" fill="#a1a1aa"/>
  <text x="356" y="472" font-family="system-ui" font-size="11" fill="#52525b">高三(1)班</text>
  <rect x="436" y="463" width="28" height="12" rx="4" fill="#f4f4f5"/>
  <text x="450" y="472" text-anchor="middle" font-family="system-ui" font-size="8" fill="#a1a1aa">已结束</text>

  <text x="730" y="460" font-family="system-ui" font-size="11" fill="#2563eb">查看全部</text>
  <path d="M738 466 L746 466 L742 460" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
