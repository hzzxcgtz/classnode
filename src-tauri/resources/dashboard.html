<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassNode</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(160deg, #f0f4ff 0%, #f8fafc 100%);
  color: #1e293b; user-select: none; min-height: 100vh;
}
.container { padding: 28px 24px 20px; max-width: 460px; margin: 0 auto; }

/* 顶部 */
.header {
  display: flex; align-items: center; gap: 14px; margin-bottom: 24px;
}
.header img { width: 48px; height: 48px; border-radius: 14px; object-fit: cover; }
.header-right h1 { font-size: 21px; font-weight: 700; color: #0f172a; letter-spacing: -0.3px; }
.header-right .sub { font-size: 12px; color: #94a3b8; margin-top: 1px; }
.badge {
  display: inline-block; font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: 6px;
  background: #eef2ff; color: #4f46e5; margin-left: 8px; vertical-align: middle;
}

/* 错误提示 */
.error-bar {
  background: #fef2f2; border: 1px solid #fecaca; border-radius: 12px;
  padding: 10px 14px; font-size: 12px; color: #991b1b; margin-bottom: 16px;
  display: none; line-height: 1.5;
}
.error-bar.show { display: block; }

/* 卡片通用 */
.card {
  background: white; border-radius: 18px; padding: 22px 24px;
  margin-bottom: 14px; border: 1px solid #e2e8f0;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

/* 状态卡片 */
.status-top {
  display: flex; align-items: center; justify-content: space-between;
}
.status-left { display: flex; align-items: center; gap: 12px; }
.status-dot {
  width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
}
.status-dot.running {
  background: #22c55e;
  box-shadow: 0 0 12px rgba(34,197,94,0.5);
}
.status-dot.stopped {
  background: #ef4444;
  box-shadow: 0 0 12px rgba(239,68,68,0.3);
}
.status-dot.starting {
  background: #f59e0b;
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(245,158,11,0.1); }
}
.status-label { font-size: 15px; font-weight: 600; }
.status-label.running { color: #16a34a; }
.status-label.stopped { color: #dc2626; }
.status-label.starting { color: #d97706; }
.status-time { font-size: 12px; color: #94a3b8; margin-top: 8px; }

/* 操作按钮 */
.actions { display: flex; gap: 10px; margin-top: 18px; }
.btn {
  flex: 1; padding: 11px; border-radius: 12px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all 0.15s;
}
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-primary {
  background: #2563eb; color: white;
  box-shadow: 0 2px 8px rgba(37,99,235,0.2);
}
.btn-primary:hover:not(:disabled) { background: #1d4ed8; }
.btn-danger {
  background: white; color: #ef4444;
  border: 1.5px solid #fecaca;
}
.btn-danger:hover:not(:disabled) { background: #fef2f2; }

/* 地址卡片 */
.address-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
}
.address-header .title { font-size: 13px; font-weight: 600; color: #64748b; letter-spacing: 0.3px; }
.address-header .port {
  font-size: 11px; color: #94a3b8; background: #f1f4f9;
  padding: 2px 10px; border-radius: 6px;
}
.url-row { display: flex; gap: 12px; }
.url-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 16px 12px; border-radius: 14px; border: 1.5px solid #e2e8f0;
  background: #f8fafc; cursor: pointer; transition: all 0.15s;
}
.url-btn:hover:not(:disabled) {
  background: #eff6ff; border-color: #93c5fd;
  box-shadow: 0 2px 8px rgba(37,99,235,0.1);
}
.url-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.url-btn svg { width: 22px; height: 22px; color: #64748b; }
.url-btn:hover:not(:disabled) svg { color: #2563eb; }
.url-btn .label { font-size: 12px; font-weight: 600; color: #475569; }
.url-btn:hover:not(:disabled) .label { color: #2563eb; }
.url-btn .url-text { font-size: 11px; color: #94a3b8; margin-top: 2px; }

/* IP 列表 */
.ip-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid #f1f5f9; display: none; }
.ip-title { font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
.ip-item {
  font-size: 13px; color: #475569; font-weight: 500;
  padding: 4px 0; display: flex; align-items: center; gap: 8px;
}
.ip-item::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: #22c55e; flex-shrink: 0;
}

/* 底部 */
.footer { text-align: center; font-size: 12px; color: #cbd5e1; margin-top: 24px; }
</style>
</head>
<body>
<div class="container">
  <!-- 顶部 -->
  <div class="header">
    <img src="/logo.png" alt="ClassNode">
    <div class="header-right">
      <h1>ClassNode <span class="badge" id="versionLabel">v1.3.5</span></h1>
      <div class="sub">AI 互动课堂系统</div>
    </div>
  </div>

  <!-- 错误提示 -->
  <div class="error-bar" id="errorBar"></div>

  <!-- 服务状态 -->
  <div class="card">
    <div class="status-top">
      <div class="status-left">
        <span class="status-dot starting" id="statusDot"></span>
        <span class="status-label starting" id="statusText">启动中...</span>
      </div>
    </div>
    <div class="status-time" id="statusTime"></div>
    <div class="actions">
      <button class="btn btn-primary" id="btnStart" onclick="startServer()">启动服务</button>
      <button class="btn btn-danger" id="btnStop" onclick="stopServer()">停止服务</button>
    </div>
  </div>

  <!-- 访问地址 -->
  <div class="card">
    <div class="address-header">
      <span class="title">访问地址</span>
      <span class="port" id="portLabel">端口 3001</span>
    </div>
    <div class="url-row">
      <button class="url-btn" id="btnTeacher" onclick="openUrl('teacher')" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <span class="label">教师端</span>
        <span class="url-text" id="teacherUrl">加载中...</span>
      </button>
      <button class="url-btn" id="btnStudent" onclick="openUrl('student')" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        <span class="label">学生端</span>
        <span class="url-text" id="studentUrl">加载中...</span>
      </button>
    </div>
    <div class="ip-section" id="ipSection">
      <div class="ip-title">局域网地址</div>
      <div id="ipList"></div>
    </div>
  </div>

  <div class="footer">ClassNode v<span id="footerVersion">1.3.5</span></div>
</div>

<script>
let pollingTimer = null;

function tauriInvoke(cmd, args) {
  const w = window;
  if (w.__TAURI__?.core?.invoke) return w.__TAURI__.core.invoke(cmd, args);
  if (w.__TAURI__?.invoke) return w.__TAURI__.invoke(cmd, args);
  return null;
}

function showError(msg) {
  const bar = document.getElementById('errorBar');
  bar.textContent = msg;
  bar.classList.add('show');
  setTimeout(() => bar.classList.remove('show'), 5000);
}

function updateUI(status) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const btnStart = document.getElementById('btnStart');
  const btnStop = document.getElementById('btnStop');
  const btnTeacher = document.getElementById('btnTeacher');
  const btnStudent = document.getElementById('btnStudent');
  const timeEl = document.getElementById('statusTime');
  const portLabel = document.getElementById('portLabel');

  portLabel.textContent = `端口 ${status.port || 3001}`;

  if (status.running) {
    dot.className = 'status-dot running';
    text.className = 'status-label running';
    text.textContent = '运行中';
    btnStart.disabled = true;
    btnStop.disabled = false;
    btnTeacher.disabled = false;
    btnStudent.disabled = false;
    timeEl.textContent = '服务正常运行中';

    const host = status.ips && status.ips.length > 0 ? status.ips[0] : 'localhost';
    const base = `http://${host}:${status.port}`;
    document.getElementById('teacherUrl').textContent = `${base}/teacher`;
    document.getElementById('studentUrl').textContent = `${base}/classroom`;

    const section = document.getElementById('ipSection');
    const list = document.getElementById('ipList');
    if (status.ips && status.ips.length > 1) {
      section.style.display = 'block';
      list.innerHTML = status.ips.slice(1).map(ip =>
        `<div class="ip-item">${ip}</div>`
      ).join('');
    } else {
      section.style.display = 'none';
    }
  } else {
    dot.className = 'status-dot stopped';
    text.className = 'status-label stopped';
    text.textContent = '已停止';
    btnStart.disabled = false;
    btnStop.disabled = true;
    btnTeacher.disabled = true;
    btnStudent.disabled = true;
    timeEl.textContent = '服务未运行，点击「启动服务」开始';
  }
}

async function checkStatus() {
  try {
    const invoke = tauriInvoke;
    let status;
    if (invoke) {
      status = await invoke('get_server_status');
    } else {
      try {
        const resp = await fetch('http://localhost:3001/api/health');
        status = { running: resp.ok, port: 3001, ips: [] };
      } catch {
        status = { running: false, port: 3001, ips: [] };
      }
    }
    updateUI(status);
  } catch (e) {
    console.error('状态检测失败:', e);
  }
}

async function startServer() {
  try {
    document.getElementById('btnStart').disabled = true;
    document.getElementById('statusText').textContent = '启动中...';
    await tauriInvoke('cmd_start_server');
    setTimeout(checkStatus, 800);
  } catch (e) {
    showError('启动服务失败: ' + e);
    document.getElementById('btnStart').disabled = false;
  }
}

async function stopServer() {
  try {
    document.getElementById('btnStop').disabled = true;
    await tauriInvoke('cmd_stop_server');
    setTimeout(checkStatus, 500);
  } catch (e) {
    showError('停止服务失败: ' + e);
    document.getElementById('btnStop').disabled = false;
  }
}

function openUrl(type) {
  try {
    tauriInvoke('cmd_open_url', { urlType: type });
  } catch (e) { console.error(e); }
}

setTimeout(() => {
  checkStatus();
  pollingTimer = setInterval(checkStatus, 3000);
}, 1500);
</script>
</body>
</html>
