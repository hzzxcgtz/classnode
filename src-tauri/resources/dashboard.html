<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassNode</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f0f2f5;
  color: #1e293b;
  user-select: none;
  -webkit-user-select: none;
}
.container { padding: 24px; max-width: 460px; margin: 0 auto; }

/* 顶部 */
.header {
  display: flex; align-items: center; gap: 14px;
  padding-bottom: 20px; border-bottom: 1px solid #e8ecf0;
  margin-bottom: 20px;
}
.header-info h1 { font-size: 20px; font-weight: 700; color: #0f172a; }
.header-info .sub {
  font-size: 12px; color: #94a3b8; margin-top: 2px;
}
.badge {
  display: inline-block; font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: 6px;
  background: #f1f4f9; color: #94a3b8; margin-left: 8px;
}

/* 卡片 */
.card {
  background: white; border-radius: 16px;
  border: 1px solid #e2e8f0; padding: 20px;
  margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.card-title {
  font-size: 13px; font-weight: 600; color: #64748b;
  margin-bottom: 14px; letter-spacing: 0.3px;
}

/* 状态行 */
.status-row {
  display: flex; align-items: center; justify-content: space-between;
}
.status-left { display: flex; align-items: center; gap: 10px; }
.status-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.status-dot.running { background: #22c55e; box-shadow: 0 0 10px rgba(34,197,94,0.5); }
.status-dot.stopped { background: #ef4444; box-shadow: 0 0 10px rgba(239,68,68,0.3); }
.status-dot.starting {
  background: #f59e0b;
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.4); }
  50% { box-shadow: 0 0 0 6px rgba(245,158,11,0); }
}
.status-text { font-size: 15px; font-weight: 600; }
.status-text.running { color: #16a34a; }
.status-text.stopped { color: #dc2626; }
.status-text.starting { color: #d97706; }

/* 操作按钮 */
.actions { display: flex; gap: 10px; margin-top: 16px; }
.btn {
  flex: 1; padding: 10px; border-radius: 10px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all 0.15s;
}
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-primary { background: #2563eb; color: white; }
.btn-primary:hover:not(:disabled) { background: #1d4ed8; }
.btn-danger { background: #ef4444; color: white; }
.btn-danger:hover:not(:disabled) { background: #dc2626; }

/* 地址按钮 */
.url-row { display: flex; gap: 10px; }
.url-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0;
  background: #f8fafc; color: #475569;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all 0.15s; text-decoration: none;
}
.url-btn:hover { background: #eff6ff; border-color: #2563eb; color: #2563eb; }
.url-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* IP 列表 */
.ip-section { margin-top: 14px; padding-top: 14px; border-top: 1px solid #f1f5f9; display: none; }
.ip-title { font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
.ip-item { font-size: 13px; color: #475569; padding: 3px 0; font-weight: 500; }

/* 错误提示 */
.error-bar {
  background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px;
  padding: 10px 14px; font-size: 12px; color: #991b1b; margin-bottom: 14px;
  display: none; line-height: 1.5;
}
.error-bar.show { display: block; }

/* 底部 */
.footer { text-align: center; font-size: 12px; color: #cbd5e1; margin-top: 20px; }
</style>
</head>
<body>
<div class="container">
  <!-- 顶部 -->
  <div class="header">
    <img src="/logo.png" alt="ClassNode" style="width:44px;height:44px;border-radius:12px;object-fit:cover;">
    <div class="header-info">
      <div style="display:flex;align-items:center;">
        <h1>ClassNode</h1>
        <span class="badge" id="versionLabel">v1.3.5</span>
      </div>
      <div class="sub">AI 互动课堂系统</div>
    </div>
  </div>

  <!-- 错误提示 -->
  <div class="error-bar" id="errorBar"></div>

  <!-- 服务状态 -->
  <div class="card">
    <div class="card-title">服务状态</div>
    <div class="status-row">
      <div class="status-left">
        <span class="status-dot starting" id="statusDot"></span>
        <span class="status-text starting" id="statusText">启动中...</span>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="btnStart" onclick="startServer()">启动服务</button>
      <button class="btn btn-danger" id="btnStop" onclick="stopServer()">停止服务</button>
    </div>
  </div>

  <!-- 访问地址 -->
  <div class="card">
    <div class="card-title">访问地址</div>
    <div class="url-row">
      <button class="url-btn" id="btnTeacher" onclick="openUrl('teacher')" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <span id="teacherUrl">加载中...</span>
      </button>
      <button class="url-btn" id="btnStudent" onclick="openUrl('student')" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        <span id="studentUrl">加载中...</span>
      </button>
    </div>
    <div class="ip-section" id="ipSection">
      <div class="ip-title">局域网地址</div>
      <div id="ipList"></div>
    </div>
  </div>

  <div class="footer">ClassNode v<span id="footerVersion">1.3.5</span></div>
</div>

<script>
let pollingTimer = null;

function tauriInvoke(cmd, args) {
  const w = window;
  if (w.__TAURI__?.core?.invoke) return w.__TAURI__.core.invoke(cmd, args);
  if (w.__TAURI__?.invoke) return w.__TAURI__.invoke(cmd, args);
  return null;
}

function showError(msg) {
  const bar = document.getElementById('errorBar');
  bar.textContent = msg;
  bar.classList.add('show');
  setTimeout(() => bar.classList.remove('show'), 5000);
}

function updateUI(status) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const btnStart = document.getElementById('btnStart');
  const btnStop = document.getElementById('btnStop');
  const btnTeacher = document.getElementById('btnTeacher');
  const btnStudent = document.getElementById('btnStudent');

  if (status.running) {
    dot.className = 'status-dot running';
    text.className = 'status-text running';
    text.textContent = '运行中';
    btnStart.disabled = true;
    btnStop.disabled = false;
    btnTeacher.disabled = false;
    btnStudent.disabled = false;

    const host = status.ips && status.ips.length > 0 ? status.ips[0] : 'localhost';
    document.getElementById('teacherUrl').textContent = `http://${host}:${status.port}/teacher`;
    document.getElementById('studentUrl').textContent = `http://${host}:${status.port}/classroom`;

    const section = document.getElementById('ipSection');
    const list = document.getElementById('ipList');
    if (status.ips && status.ips.length > 1) {
      section.style.display = 'block';
      list.innerHTML = status.ips.slice(1).map(ip =>
        `<div class="ip-item">${ip}</div>`
      ).join('');
    } else {
      section.style.display = 'none';
    }
  } else {
    dot.className = 'status-dot stopped';
    text.className = 'status-text stopped';
    text.textContent = '已停止';
    btnStart.disabled = false;
    btnStop.disabled = true;
    btnTeacher.disabled = true;
    btnStudent.disabled = true;
  }
}

async function checkStatus() {
  try {
    const invoke = tauriInvoke;
    let status;
    if (invoke) {
      status = await invoke('get_server_status');
    } else {
      try {
        const resp = await fetch('http://localhost:3001/api/health');
        status = { running: resp.ok, port: 3001, ips: [] };
      } catch {
        status = { running: false, port: 3001, ips: [] };
      }
    }
    updateUI(status);
  } catch (e) {
    console.error('状态检测失败:', e);
  }
}

async function startServer() {
  try {
    document.getElementById('btnStart').disabled = true;
    document.getElementById('statusText').textContent = '启动中...';
    await tauriInvoke('cmd_start_server');
    setTimeout(checkStatus, 800);
  } catch (e) {
    showError('启动服务失败: ' + e);
    document.getElementById('btnStart').disabled = false;
  }
}

async function stopServer() {
  try {
    document.getElementById('btnStop').disabled = true;
    await tauriInvoke('cmd_stop_server');
    setTimeout(checkStatus, 500);
  } catch (e) {
    showError('停止服务失败: ' + e);
    document.getElementById('btnStop').disabled = false;
  }
}

function openUrl(type) {
  try {
    tauriInvoke('cmd_open_url', { urlType: type });
  } catch (e) { console.error(e); }
}

// 启动后等一会再开始检测（让服务有足够时间启动）
setTimeout(() => {
  checkStatus();
  pollingTimer = setInterval(checkStatus, 3000);
}, 1500);
</script>
</body>
</html>
