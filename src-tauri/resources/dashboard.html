<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassNode</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f5f5f7;
  --surface: rgba(255,255,255,0.78);
  --surface-solid: #ffffff;
  --text: #1d1d1f;
  --text2: #6e6e73;
  --text3: #aeaeb2;
  --border: rgba(0,0,0,0.06);
  --shadow: 0 8px 30px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.02);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.03);
  --accent: #007aff;
  --accent-glow: rgba(0,122,255,0.15);
  --green: #34c759;
  --green-glow: rgba(52,199,89,0.15);
  --red: #ff3b30;
  --red-glow: rgba(255,59,48,0.1);
  --orange: #ff9500;
  --orange-glow: rgba(255,149,0,0.15);
  --gradient: linear-gradient(135deg, #5856d6, #007aff);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1e;
    --surface: rgba(44,44,46,0.82);
    --surface-solid: #2c2c2e;
    --text: #f5f5f7;
    --text2: #98989d;
    --text3: #636366;
    --border: rgba(255,255,255,0.06);
    --shadow: 0 8px 30px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.15);
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.15);
    --accent-glow: rgba(10,132,255,0.2);
    --green-glow: rgba(48,209,88,0.2);
    --red-glow: rgba(255,69,58,0.15);
    --orange-glow: rgba(255,159,10,0.2);
  }
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: -apple-system, "Segoe UI", system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  user-select: none;
}

/* ===== Shell ===== */
.shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 0 20px;
}

/* ===== Header ===== */
.head {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 24px 0 20px;
  -webkit-app-region: drag;
  border-bottom: 1px solid var(--border);
}

.head-icon {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  object-fit: cover;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(88,86,214,0.2);
}

.head-fallback {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  background: var(--gradient);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(88,86,214,0.2);
  display: none;
}

.head-fallback svg { width: 28px; height: 28px; }

.head-body { flex: 1; }

.head-body h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
  line-height: 1.2;
}

.head-body .sub {
  font-size: 13px;
  color: var(--text2);
  margin-top: 3px;
}

.head-version {
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  background: rgba(0,122,255,0.08);
  padding: 2px 10px;
  border-radius: 6px;
  margin-left: 8px;
  vertical-align: middle;
  border: 0.5px solid rgba(0,122,255,0.15);
}

/* ===== Scroll ===== */
.scroll {
  flex: 1;
  overflow-y: auto;
  padding: 20px 0 0;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.scroll::-webkit-scrollbar { width: 4px; }
.scroll::-webkit-scrollbar-thumb { background: var(--text3); border-radius: 4px; }

/* ===== Error ===== */
.err {
  display: none;
  background: var(--red-glow);
  border: 0.5px solid rgba(255,59,48,0.15);
  border-radius: 12px;
  padding: 14px 18px;
  font-size: 13px;
  color: var(--red);
  line-height: 1.5;
  animation: errIn 0.25s ease;
}

@keyframes errIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.err.show { display: block; }

/* ===== Card ===== */
.card {
  background: var(--surface);
  -webkit-backdrop-filter: saturate(1.8) blur(20px);
  backdrop-filter: saturate(1.8) blur(20px);
  border-radius: 16px;
  padding: 24px;
  box-shadow: var(--shadow);
  border: 0.5px solid var(--border);
}

/* ===== Status Section ===== */
.status-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.status-badge {
  display: flex;
  align-items: center;
  gap: 12px;
}

.dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  position: relative;
  flex-shrink: 0;
}

.dot.run { background: var(--green); }
.dot.run::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  background: var(--green);
  opacity: 0.3;
  animation: dotPulse 2s ease-in-out infinite;
}

@keyframes dotPulse {
  0%, 100% { transform: scale(1); opacity: 0.3; }
  50% { transform: scale(1.8); opacity: 0.08; }
}

.dot.stop { background: var(--red); }
.dot.go { background: var(--orange); animation: dotBlink 0.7s ease-in-out infinite; }

@keyframes dotBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

.status-label {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.status-label.run { color: var(--green); }
.status-label.stop { color: var(--red); }
.status-label.go { color: var(--orange); }

.status-port {
  font-size: 13px;
  color: var(--text2);
  font-weight: 500;
}

.status-desc {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.5;
  margin-bottom: 20px;
}

/* Buttons */
.act {
  display: flex;
  gap: 12px;
}

.act .btn {
  flex: 1;
  padding: 14px 20px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s cubic-bezier(0.2, 0, 0, 1);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.act .btn:active { transform: scale(0.97); }
.act .btn:disabled { opacity: 0.3; cursor: default; transform: none; }

.act .btn svg { width: 18px; height: 18px; }

.btn-primary {
  background: var(--accent);
  color: white;
  box-shadow: 0 4px 14px var(--accent-glow);
}

.btn-primary:hover:not(:disabled) { filter: brightness(1.08); }

.btn-secondary {
  background: var(--surface-solid);
  color: var(--text);
  border: 0.5px solid var(--border);
  box-shadow: var(--shadow-sm);
}

.btn-secondary:hover:not(:disabled) { background: rgba(60,60,67,0.04); }

/* ===== Address Section ===== */
.addr-title {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
}

.addr-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 0;
}

.addr-item + .addr-item { border-top: 1px solid var(--border); }
.addr-item:first-of-type { padding-top: 0; }
.addr-item:last-of-type { padding-bottom: 0; }

.addr-name {
  font-size: 14px;
  font-weight: 600;
  min-width: 44px;
  flex-shrink: 0;
  color: var(--text);
}

.addr-url {
  flex: 1;
  font-size: 14px;
  color: var(--text2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-family: "SF Mono", "Menlo", "Cascadia Code", monospace;
  font-variant-numeric: tabular-nums;
}

.addr-acts {
  display: flex;
  gap: 2px;
  flex-shrink: 0;
}

.addr-acts .ibtn {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  border: none;
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s;
  color: var(--text3);
}

.addr-acts .ibtn:hover:not(:disabled) { background: var(--bg); color: var(--text); }
.addr-acts .ibtn:active:not(:disabled) { transform: scale(0.9); }
.addr-acts .ibtn:disabled { opacity: 0.2; cursor: default; }
.addr-acts .ibtn svg { width: 17px; height: 17px; }

/* IP */
.ip-box {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  display: none;
}

.ip-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text3);
  margin-bottom: 8px;
}

.ip-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.ip-chip {
  font-size: 13px;
  color: var(--text2);
  background: var(--bg);
  padding: 6px 14px;
  border-radius: 8px;
}

/* ===== Footer ===== */
.foot {
  padding: 6px 0 22px;
}

.foot-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  text-align: center;
  margin-bottom: 6px;
}

.foot-btns {
  display: flex;
  gap: 10px;
}

.foot-btns .fbtn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 14px;
  border-radius: 10px;
  background: var(--surface);
  border: 0.5px solid var(--border);
  font-size: 14px;
  font-weight: 500;
  color: var(--text2);
  text-decoration: none;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  box-shadow: var(--shadow-sm);
}

.foot-btns .fbtn:hover {
  background: var(--accent-glow);
  border-color: var(--accent);
  color: var(--accent);
}

.foot-btns .fbtn:active { transform: scale(0.97); }

.foot-btns .fbtn svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

.foot-btns .fbtn img {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  border-radius: 3px;
}

/* ===== Copy flash ===== */
@keyframes copyFlash {
  0% { background: var(--accent); color: white; border-radius: 8px; }
  100% { background: transparent; }
}

.ibtn.copied { animation: copyFlash 0.5s ease-out; }
</style>
</head>
<body>
<div class="shell">
  <!-- Header -->
  <div class="head">
    <img class="head-icon" src="logo.png" alt="" onerror="this.style.display='none';document.getElementById('headFallback').style.display='flex'">
    <div class="head-fallback" id="headFallback">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div class="head-body">
      <h1>ClassNode <span class="head-version">__APP_VERSION__</span></h1>
      <div class="sub">AI 互动课堂 · 控制面板</div>
    </div>
  </div>

  <!-- Error -->
  <div class="err" id="errBox"></div>

  <!-- Content -->
  <div class="scroll">
    <!-- Status -->
    <div class="card">
      <div class="status-head">
        <div class="status-badge">
          <span class="dot go" id="sDot"></span>
          <span class="status-label go" id="sLabel">启动中...</span>
        </div>
        <span class="status-port" id="sPort">服务端口 3001</span>
      </div>
      <div class="status-desc" id="sDesc">正在连接本地服务…</div>
      <div class="act">
        <button class="btn btn-primary" id="btnGo" onclick="startSrv()">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          启动
        </button>
        <button class="btn btn-secondary" id="btnStop" onclick="stopSrv()">停止</button>
      </div>
    </div>

    <!-- Addresses -->
    <div class="card">
      <div class="addr-title">访问地址</div>
      <div class="addr-item">
        <span class="addr-name">教师</span>
        <span class="addr-url" id="urlT">—</span>
        <div class="addr-acts">
          <button class="ibtn" id="btnTC" onclick="cpUrl('teacher')" disabled title="复制">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
          <button class="ibtn" id="btnTO" onclick="openUrl('teacher')" disabled title="打开">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </button>
        </div>
      </div>
      <div class="addr-item">
        <span class="addr-name">学生</span>
        <span class="addr-url" id="urlS">—</span>
        <div class="addr-acts">
          <button class="ibtn" id="btnSC" onclick="cpUrl('student')" disabled title="复制">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
          <button class="ibtn" id="btnSO" onclick="openUrl('student')" disabled title="打开">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </button>
        </div>
      </div>
      <div class="ip-box" id="ipBox">
        <div class="ip-label">局域网 IP</div>
        <div class="ip-chips" id="ipList"></div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="foot">
    <div class="foot-title">项目地址</div>
    <div class="foot-btns">
      <a class="fbtn" href="#" onclick="openUrl('gitcode')">
        <img src="gitcode_logo.png" alt="">
        GitCode
      </a>
      <a class="fbtn" href="#" onclick="openUrl('github')">
        <img src="github_logo.png" alt="">
        GitHub
      </a>
    </div>
  </div>
</div>

<script>
let _p = null;
const invoke = (window.__TAURI__?.core?.invoke || window.__TAURI__?.invoke || (() => null));

function eShow(m) {
  const e = document.getElementById('errBox');
  e.textContent = m;
  e.classList.add('show');
  setTimeout(() => e.classList.remove('show'), 4000);
}

function ui(s) {
  const dot = document.getElementById('sDot');
  const lab = document.getElementById('sLabel');
  const desc = document.getElementById('sDesc');
  const go = document.getElementById('btnGo');
  const stp = document.getElementById('btnStop');
  document.getElementById('sPort').textContent = `服务端口 ${s.port || 3001}`;

  const bts = ['TC','TO','SC','SO'].map(i => document.getElementById('btn' + i));

  if (s.running) {
    dot.className = 'dot run';
    lab.className = 'status-label run';
    lab.textContent = '运行中';
    go.disabled = true; stp.disabled = false;
    bts.forEach(b => b.disabled = false);
    desc.textContent = '服务正常，局域网内设备可扫码或输入地址加入课堂';

    const h = (s.ips && s.ips[0]) || 'localhost';
    const b = `http://${h}:${s.port}`;
    document.getElementById('urlT').textContent = b + '/teacher';
    document.getElementById('urlS').textContent = b + '/classroom';

    const bx = document.getElementById('ipBox');
    const ls = document.getElementById('ipList');
    if (s.ips && s.ips.length > 1) {
      bx.style.display = 'block';
      ls.innerHTML = s.ips.slice(1).map(i => `<span class="ip-chip">${i}</span>`).join('');
    } else { bx.style.display = 'none'; }
  } else {
    dot.className = 'dot stop';
    lab.className = 'status-label stop';
    lab.textContent = '已停止';
    go.disabled = false; stp.disabled = true;
    bts.forEach(b => b.disabled = true);
    desc.textContent = '服务未运行，点击「启动」按钮开启';
  }
}

async function chk() {
  try {
    let s;
    try { s = await invoke('get_server_status'); }
    catch {
      try { const r = await fetch('http://localhost:3001/api/health'); s = { running: r.ok, port: 3001, ips: [] }; }
      catch { s = { running: false, port: 3001, ips: [] }; }
    }
    ui(s);
  } catch (e) { console.error(e); }
}

async function startSrv() {
  try {
    document.getElementById('btnGo').disabled = true;
    document.getElementById('sDot').className = 'dot go';
    document.getElementById('sLabel').className = 'status-label go';
    document.getElementById('sLabel').textContent = '启动中…';
    await invoke('cmd_start_server');
    setTimeout(chk, 900);
  } catch (e) { eShow('启动失败: ' + e); chk(); }
}

async function stopSrv() {
  try {
    document.getElementById('btnStop').disabled = true;
    await invoke('cmd_stop_server');
    setTimeout(chk, 600);
  } catch (e) { eShow('停止失败: ' + e); }
}

function openUrl(t) {
  try { invoke('cmd_open_url', { urlType: t }); } catch (e) { console.error(e); }
}

async function cpUrl(t) {
  const el = document.getElementById(t === 'teacher' ? 'urlT' : 'urlS');
  const u = el.textContent;
  if (!u || u === '—') return;
  try {
    await navigator.clipboard.writeText(u);
    const btn = document.getElementById('btn' + (t === 'teacher' ? 'T' : 'S') + 'C');
    btn.classList.add('copied');
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    }, 700);
  } catch (e) { console.error(e); }
}

setTimeout(() => { chk(); _p = setInterval(chk, 3000); }, 900);
</script>
</body>
</html>
