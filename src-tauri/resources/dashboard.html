<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassNode</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: linear-gradient(160deg, #f0f2f5 0%, #e8ecf1 100%);
  --surface: rgba(255,255,255,0.68);
  --surface-hover: rgba(255,255,255,0.85);
  --text: #1d1d1f;
  --text2: #6e6e73;
  --text3: #aeaeb2;
  --border: rgba(0,0,0,0.05);
  --shadow: 0 8px 32px rgba(0,0,0,0.04), 0 1px 4px rgba(0,0,0,0.02);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.03);
  --accent: #007aff;
  --accent-bg: rgba(0,122,255,0.1);
  --green: #34c759;
  --green-bg: rgba(52,199,89,0.12);
  --red: #ff3b30;
  --red-bg: rgba(255,59,48,0.08);
  --orange: #ff9500;
  --orange-bg: rgba(255,149,0,0.1);
  --radius: 18px;
  --radius-sm: 10px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: linear-gradient(160deg, #1c1c1e 0%, #222224 100%);
    --surface: rgba(44,44,46,0.72);
    --surface-hover: rgba(44,44,46,0.9);
    --text: #f5f5f7;
    --text2: #98989d;
    --text3: #636366;
    --border: rgba(255,255,255,0.05);
    --shadow: 0 8px 32px rgba(0,0,0,0.3), 0 1px 4px rgba(0,0,0,0.15);
    --accent: #0a84ff;
    --accent-bg: rgba(10,132,255,0.15);
    --green: #30d158;
    --green-bg: rgba(48,209,88,0.12);
    --red: #ff453a;
    --red-bg: rgba(255,69,58,0.1);
    --orange: #ff9f0a;
    --orange-bg: rgba(255,159,10,0.12);
  }
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  user-select: none;
}

/* ===== Shell ===== */
.shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 0 20px;
}

/* ===== Header ===== */
.head {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 22px 0 18px;
  -webkit-app-region: drag;
  border-bottom: 0.5px solid var(--border);
}

.head-icon {
  width: 52px; height: 52px;
  border-radius: 14px;
  object-fit: cover;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(88,86,214,0.15), inset 0 1px 0 rgba(255,255,255,0.25);
}

.head-body { flex: 1; min-width: 0; }

.head-body h1 {
  font-size: 20px; font-weight: 700; letter-spacing: -0.3px;
  line-height: 1.2; display: flex; align-items: center; gap: 8px;
}

.head-version {
  font-size: 10px; font-weight: 600;
  color: var(--accent); background: var(--accent-bg);
  padding: 1px 8px; border-radius: 5px;
  vertical-align: middle;
}

.head-body .sub {
  font-size: 12px; color: var(--text2);
  margin-top: 3px;
}

/* ===== Scroll ===== */
.scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px 0 0;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.scroll::-webkit-scrollbar { width: 4px; }
.scroll::-webkit-scrollbar-thumb { background: var(--text3); border-radius: 4px; }

/* ===== Error ===== */
.err {
  display: none;
  background: var(--red-bg);
  border: 0.5px solid rgba(255,59,48,0.12);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 13px; color: var(--red);
  line-height: 1.5;
  animation: errIn 0.25s ease;
}
@keyframes errIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.err.show { display: block; }

/* ===== Card ===== */
.card {
  background: var(--surface);
  backdrop-filter: saturate(1.6) blur(24px);
  -webkit-backdrop-filter: saturate(1.6) blur(24px);
  border-radius: var(--radius);
  padding: 22px;
  box-shadow: var(--shadow);
  border: 0.5px solid var(--border);
  transition: all 0.2s ease;
}

/* ===== Status Section ===== */
.status-head {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.status-badge {
  display: flex; align-items: center; gap: 10px;
}

.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  position: relative;
  flex-shrink: 0;
}

.dot.run { background: var(--green); }
.dot.run::after {
  content: '';
  position: absolute;
  inset: -5px;
  border-radius: 50%;
  background: var(--green);
  opacity: 0.3;
  animation: breathe 2.2s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { transform: scale(1); opacity: 0.25; }
  50% { transform: scale(1.6); opacity: 0.06; }
}

.dot.stop { background: var(--red); }
.dot.stopping { background: var(--red); animation: stopFade 0.9s ease-in-out infinite; }
@keyframes stopFade {
  0%, 100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(0.7); opacity: 0.25; }
}

.dot.go { background: transparent; position: relative; }
.dot.go::before {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2.5px solid var(--orange);
  border-top-color: transparent;
  animation: spin 0.8s linear infinite;
}
.dot.go::after {
  content: '';
  position: absolute;
  inset: 2px;
  border-radius: 50%;
  background: var(--orange);
  opacity: 0.35;
}
@keyframes spin { to { transform: rotate(360deg); } }

.status-label {
  font-size: 20px; font-weight: 700;
  letter-spacing: -0.3px;
}
.status-label.run { color: var(--green); }
.status-label.stop { color: var(--red); }
.status-label.stopping { color: var(--red); opacity: 0.6; }
.status-label.go { color: var(--orange); }

.status-port {
  font-size: 11px; font-weight: 500;
  color: var(--green); background: var(--green-bg);
  padding: 3px 10px; border-radius: 6px;
}

.status-desc {
  font-size: 13px; color: var(--text2);
  line-height: 1.5; margin-bottom: 16px;
}

/* Buttons */
.act {
  display: flex; gap: 8px;
  justify-content: flex-end;
}

.act .btn {
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  transition: all 0.2s ease;
  display: flex; align-items: center; gap: 6px;
}

.act .btn:active { transform: scale(0.96); }
.act .btn:disabled { opacity: 0.25; cursor: default; transform: none; }

.act .btn svg { width: 15px; height: 15px; }

.btn-start {
  background: var(--accent); color: white;
  box-shadow: 0 4px 12px rgba(0,122,255,0.15);
}
.btn-start:hover:not(:disabled) { filter: brightness(1.08); transform: translateY(-1px); }

.btn-stop {
  background: transparent; color: var(--red);
  border: 0.5px solid rgba(255,59,48,0.15);
}
.btn-stop:hover:not(:disabled) { background: var(--red-bg); border-color: var(--red); }

/* ===== Address Section ===== */
.addr-title {
  font-size: 15px; font-weight: 600;
  margin-bottom: 12px;
}

.addr-item {
  display: flex; align-items: center;
  gap: 8px; padding: 10px 12px;
  border-radius: var(--radius-sm);
  background: rgba(0,0,0,0.018);
  transition: all 0.2s ease;
}
.addr-item:hover { background: var(--surface-hover); }
.addr-item + .addr-item { margin-top: 6px; }

.addr-name {
  font-size: 13px; font-weight: 600;
  min-width: 36px; flex-shrink: 0;
}

.addr-url {
  flex: 1; min-width: 0;
  font-size: 12px; color: var(--text2);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  font-family: "SF Mono", "Menlo", "Cascadia Code", "Consolas", monospace;
  font-variant-numeric: tabular-nums;
}

.addr-acts {
  display: flex; gap: 2px;
  flex-shrink: 0; opacity: 0.35;
  transition: opacity 0.2s ease;
}
.addr-item:hover .addr-acts { opacity: 1; }

.addr-acts .ibtn {
  height: 28px;
  border-radius: 6px; border: none;
  background: transparent; cursor: pointer;
  display: flex; align-items: center;
  gap: 4px;
  padding: 0 8px;
  transition: all 0.15s ease;
  color: var(--text3);
  font-size: 11px; font-weight: 500;
  font-family: inherit;
}
.addr-acts .ibtn:hover:not(:disabled) { background: var(--surface); color: var(--text); }
.addr-acts .ibtn:active:not(:disabled) { transform: scale(0.95); }
.addr-acts .ibtn:disabled { opacity: 0.15; cursor: default; }
.addr-acts .ibtn svg { width: 13px; height: 13px; flex-shrink: 0; }

/* NIC Selector (dropdown) */
.iface-box {
  display: none;
}
.iface-box.show { display: block; }
.iface-label { font-size: 11px; font-weight: 500; color: var(--text3); margin-bottom: 6px; }
.iface-select {
  width: 100%; padding: 9px 12px; border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text);
  border: 0.5px solid var(--border); font-size: 12px; font-family: inherit;
  cursor: pointer; outline: none; appearance: auto;
  transition: border-color 0.15s;
}
.iface-select:hover { border-color: var(--accent); }
.iface-select option { background: var(--surface); color: var(--text); }

/* Separator */
.sep { border: none; border-top: 0.5px solid var(--border); margin: 12px 0; }

/* Reset Password Button */
.reset-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 10px; border-radius: var(--radius-sm);
  border: 0.5px solid rgba(255,149,0,0.2); cursor: pointer;
  background: var(--orange-bg); color: var(--orange);
  font-size: 12px; font-weight: 600; font-family: inherit;
  transition: all 0.2s ease;
}
.reset-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
.reset-btn:active { transform: scale(0.97); }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 999;
  background: rgba(0,0,0,0.35); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--surface); backdrop-filter: saturate(1.6) blur(24px);
  border-radius: var(--radius); padding: 28px; width: 320px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.2);
  border: 0.5px solid var(--border);
  text-align: center;
}
.modal-icon {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--orange-bg); display: flex;
  align-items: center; justify-content: center;
  margin: 0 auto 16px;
}
.modal-icon svg { width: 24px; height: 24px; color: var(--orange); }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.modal-desc { font-size: 13px; color: var(--text2); line-height: 1.5; margin-bottom: 20px; }
.modal-actions { display: flex; gap: 8px; }
.modal-actions .btn { flex: 1; padding: 10px; border-radius: var(--radius-sm);
  border: none; font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: all 0.15s ease;
}
.modal-actions .btn:active { transform: scale(0.96); }
.modal-actions .btn-secondary { background: transparent; color: var(--text2);
  border: 0.5px solid var(--border);
}
.modal-actions .btn-secondary:hover { background: var(--surface-hover); }
.modal-actions .btn-danger { background: var(--orange); color: white; }
.modal-actions .btn-danger:hover { filter: brightness(1.08); }
.modal-actions .btn:disabled { opacity: 0.3; cursor: default; }

.modal-success {
  text-align: center;
}
.modal-success svg { width: 40px; height: 40px; color: var(--green); margin-bottom: 12px; }
.modal-success .s-text { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.modal-success .s-sub { font-size: 12px; color: var(--text2); }

/* ===== Footer ===== */
.foot {
  padding: 14px 0 20px;
  border-top: 0.5px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.foot-text {
  font-size: 13px;
  color: var(--text2);
  text-align: center;
  line-height: 1.5;
}

.foot-text em {
  font-style: normal;
  font-weight: 600;
  color: var(--text);
}

.foot-acts {
  display: flex;
  align-items: center;
  gap: 12px;
}

.foot-acts .fl {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.2s ease;
  padding: 4px 10px;
  border-radius: 8px;
}

.foot-acts .fl:hover {
  transform: scale(1.05);
  background: var(--surface);
}

.foot-acts .fl img {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  flex-shrink: 0;
}

.foot-acts .fl .fl-label {
  font-size: 12px;
  font-weight: 500;
  transition: color 0.2s ease;
}

.fl-gitcode .fl-label { color: #e4392b; }
.fl-github .fl-label { color: #24292f; }
@media (prefers-color-scheme: dark) {
  .fl-github .fl-label { color: #f0f6fc; }
}

/* ===== Copy flash ===== */
@keyframes copyFlash {
  0% { background: var(--accent); color: white; border-radius: 6px; }
  100% { background: transparent; }
}
.ibtn.copied { animation: copyFlash 0.5s ease-out; }
</style>
</head>
<body>
<div class="shell">
  <!-- Header -->
  <div class="head">
    <img class="head-icon" src="logo.png" alt="" onerror="this.style.display='none';document.getElementById('headFallback').style.display='flex'">
    <div class="head-body">
      <h1>ClassNode <span class="head-version">__APP_VERSION__</span></h1>
      <div class="sub">AI 互动课堂 · 控制面板</div>
    </div>
  </div>

  <!-- Error -->
  <div class="err" id="errBox"></div>

  <!-- Content -->
  <div class="scroll">
    <!-- Status -->
    <div class="card">
      <div class="status-head">
        <div class="status-badge">
          <span class="dot go" id="sDot"></span>
          <span class="status-label go" id="sLabel">启动中...</span>
        </div>
        <span class="status-port" id="sPort">服务端口 3001</span>
      </div>
      <div class="status-desc" id="sDesc">正在连接本地服务…</div>
      <div class="act">
        <button class="btn btn-start" id="btnGo" onclick="startSrv()">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          启动
        </button>
        <button class="btn btn-stop" id="btnStop" onclick="stopSrv()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          停止
        </button>
      </div>
    </div>

    <!-- Addresses -->
    <div class="card">
      <div class="addr-title">访问地址</div>
      <div class="addr-item">
        <span class="addr-name">教师</span>
        <span class="addr-url" id="urlT">—</span>
        <div class="addr-acts">
          <button class="ibtn" id="btnTC" onclick="cpUrl('teacher')" disabled title="复制链接">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            复制
          </button>
          <button class="ibtn" id="btnTO" onclick="openUrl('teacher')" disabled title="在浏览器打开">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            打开
          </button>
        </div>
      </div>
      <div class="addr-item">
        <span class="addr-name">学生</span>
        <span class="addr-url" id="urlS">—</span>
        <div class="addr-acts">
          <button class="ibtn" id="btnSC" onclick="cpUrl('student')" disabled title="复制链接">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            复制
          </button>
          <button class="ibtn" id="btnSO" onclick="openUrl('student')" disabled title="在浏览器打开">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            打开
          </button>
        </div>
      </div>
      <div class="iface-box" id="ifaceBox">
        <div class="iface-label">选择网卡</div>
        <select class="iface-select" id="ifaceSelect" onchange="onIfaceChange(event)"></select>
      </div>

      <hr class="sep">

      <button class="reset-btn" id="resetBtn" onclick="showResetModal()" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        重置管理密码
      </button>
    </div>
  </div>

  <!-- Reset Password Modal -->
  <div class="modal-overlay" id="resetModal">
    <div class="modal-box" id="resetModalBox">
      <!-- Confirm step -->
      <div id="resetConfirm">
        <div class="modal-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <div class="modal-title">重置管理密码？</div>
        <div class="modal-desc">密码将重置为 <strong>123456</strong>。<br>建议登录后立即修改密码。</div>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="hideResetModal()">取消</button>
          <button class="btn btn-danger" id="resetConfirmBtn" onclick="doResetPwd()">确认重置</button>
        </div>
      </div>
      <!-- Success step -->
      <div id="resetSuccess" style="display:none">
        <div class="modal-success">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          <div class="s-text">密码已重置</div>
          <div class="s-sub">默认密码：<strong>123456</strong>，请登录后修改</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="foot">
    <div class="foot-text">
      <em>教学互促 · 源码共研</em>&ensp;欢迎对技术感兴趣的老师访问仓库交流
    </div>
    <div class="foot-acts">
      <a class="fl fl-gitcode" href="#" onclick="openUrl('gitcode')" title="前往 GitCode 浏览源码">
        <img src="gitcode_logo.png" alt="">
        <span class="fl-label">GitCode</span>
      </a>
      <a class="fl fl-github" href="#" onclick="openUrl('github')" title="前往 GitHub 浏览源码">
        <img src="github_logo.png" alt="">
        <span class="fl-label">GitHub</span>
      </a>
    </div>
  </div>
</div>

<script>
let _p = null;
let _startTs = 0;
let _stopTs = 0;
let _ifaces = [];
let _selIface = -1;
const invoke = (window.__TAURI__?.core?.invoke || window.__TAURI__?.invoke || (() => null));

function eShow(m) {
  const e = document.getElementById('errBox');
  e.textContent = m;
  e.classList.add('show');
  setTimeout(() => e.classList.remove('show'), 4000);
}

function ui(s) {
  const dot = document.getElementById('sDot');
  const lab = document.getElementById('sLabel');
  const desc = document.getElementById('sDesc');
  const go = document.getElementById('btnGo');
  const stp = document.getElementById('btnStop');
  document.getElementById('sPort').textContent = `服务端口 ${s.port || 3001}`;
  const bts = ['TC','TO','SC','SO'].map(i => document.getElementById('btn' + i));

  if (s.running) {
    dot.className = 'dot run';
    lab.className = 'status-label run';
    lab.textContent = '运行中';
    go.disabled = true; stp.disabled = false;
    bts.forEach(b => b.disabled = false);
    document.getElementById('resetBtn').disabled = false;
    desc.textContent = '服务正常，局域网内设备可扫码或输入地址加入课堂';
    _startTs = 0; _stopTs = 0;

    // 记录接口信息
    _ifaces = (s.interfaces && s.interfaces.length > 0) ? s.interfaces :
              (s.ips || []).map(ip => ({ name: '网络', label: '网络', ip: ip }));
    const savedIdx = s.selectedIp ? _ifaces.findIndex(i => i.ip === s.selectedIp) : -1;
    _selIface = savedIdx >= 0 ? savedIdx : (_selIface >= 0 && _selIface < _ifaces.length ? _selIface : 0);
    renderUrls();
    renderIfaces();
  } else if (_stopTs > 0 && Date.now() - _stopTs < 15000) {
    dot.className = 'dot stopping';
    lab.className = 'status-label stopping';
    lab.textContent = '停止中…';
    go.disabled = true; stp.disabled = true;
    bts.forEach(b => b.disabled = true);
    document.getElementById('resetBtn').disabled = true;
    desc.textContent = '正在停止服务…';
  } else if (_startTs > 0 && Date.now() - _startTs < 30000) {
    dot.className = 'dot go';
    lab.className = 'status-label go';
    lab.textContent = '启动中…';
    go.disabled = true; stp.disabled = true;
    bts.forEach(b => b.disabled = true);
    document.getElementById('resetBtn').disabled = true;
    desc.textContent = '正在启动服务，请稍候…';
  } else {
    _startTs = 0; _stopTs = 0;
    dot.className = 'dot stop';
    lab.className = 'status-label stop';
    lab.textContent = '已停止';
    go.disabled = false; stp.disabled = true;
    bts.forEach(b => b.disabled = true);
    document.getElementById('resetBtn').disabled = true;
    desc.textContent = '服务未运行，点击「启动」按钮开启';
    document.getElementById('urlT').textContent = '—';
    document.getElementById('urlS').textContent = '—';
    document.getElementById('ifaceBox').style.display = 'none';
  }
}

function renderUrls() {
  const iface = _ifaces[_selIface];
  if (!iface) return;
  const h = iface.ip;
  const port = 3001;
  const b = `http://${h}:${port}`;
  document.getElementById('urlT').textContent = b + '/teacher';
  document.getElementById('urlS').textContent = b + '/classroom';
}

function renderIfaces() {
  const bx = document.getElementById('ifaceBox');
  const sel = document.getElementById('ifaceSelect');
  if (_ifaces.length <= 1) {
    bx.classList.remove('show');
    return;
  }
  bx.classList.add('show');
  const cur = sel.value;
  sel.innerHTML = _ifaces.map((iface, i) => {
    const label = iface.ip + ' — ' + (iface.label || iface.name || '未知');
    return `<option value="${iface.ip}">${escHtml(label)}</option>`;
  }).join('');
  sel.value = _ifaces[_selIface]?.ip || cur;
}

function onIfaceChange(e) {
  const ip = e.target.value;
  const idx = _ifaces.findIndex(i => i.ip === ip);
  if (idx >= 0) _selIface = idx;
  renderUrls();
  fetch('http://localhost:3001/api/settings/bind-ip', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ value: ip }) }).catch(() => {});
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function chk() {
  try {
    let s;
    try { s = await invoke('get_server_status'); }
    catch {
      try {
        const r = await fetch('http://localhost:3001/api/server-info');
        const info = await r.json();
        s = { running: true, port: info.port, ips: info.localIPs || [], interfaces: info.interfaces || [], selectedIp: info.selectedIp || '' };
      } catch {
        try { const r = await fetch('http://localhost:3001/api/health'); s = { running: r.ok, port: 3001, ips: [], interfaces: [], selectedIp: '' }; }
        catch { s = { running: false, port: 3001, ips: [], interfaces: [] }; }
      }
    }
    ui(s);
  } catch (e) { console.error(e); }
}

async function startSrv() {
  const btn = document.getElementById('btnGo');
  if (btn.disabled) return;
  _startTs = Date.now();
  btn.disabled = true;
  document.getElementById('sDot').className = 'dot go';
  document.getElementById('sLabel').className = 'status-label go';
  document.getElementById('sLabel').textContent = '启动中…';
  try {
    await invoke('cmd_start_server');
    setTimeout(chk, 2000);
  } catch (e) { eShow('启动失败: ' + e); chk(); }
}

async function stopSrv() {
  const btn = document.getElementById('btnStop');
  if (btn.disabled) return;
  _stopTs = Date.now();
  btn.disabled = true;
  document.getElementById('sDot').className = 'dot stopping';
  document.getElementById('sLabel').className = 'status-label stopping';
  document.getElementById('sLabel').textContent = '停止中…';
  try {
    await invoke('cmd_stop_server');
    _stopTs = 0;
    setTimeout(chk, 600);
  } catch (e) { _stopTs = 0; eShow('停止失败: ' + e); chk(); }
}

function openUrl(t) {
  const iface = _ifaces[_selIface];
  const ip = iface ? iface.ip : null;
  try { invoke('cmd_open_url', { urlType: t, ip: ip }); } catch (e) { console.error(e); }
}

async function cpUrl(t) {
  const el = document.getElementById(t === 'teacher' ? 'urlT' : 'urlS');
  const u = el.textContent;
  if (!u || u === '—') return;
  try {
    await navigator.clipboard.writeText(u);
    const btn = document.getElementById('btn' + (t === 'teacher' ? 'T' : 'S') + 'C');
    btn.classList.add('copied');
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    }, 700);
  } catch (e) { console.error(e); }
}

function showResetModal() {
  document.getElementById('resetConfirm').style.display = '';
  document.getElementById('resetSuccess').style.display = 'none';
  document.getElementById('resetConfirmBtn').disabled = false;
  document.getElementById('resetModal').classList.add('show');
}

function hideResetModal() {
  document.getElementById('resetModal').classList.remove('show');
}

async function doResetPwd() {
  const btn = document.getElementById('resetConfirmBtn');
  btn.disabled = true;
  try {
    const r = await fetch('http://localhost:3001/api/settings/reset-password', { method: 'POST' });
    if (!r.ok) throw new Error('重置失败');
    document.getElementById('resetConfirm').style.display = 'none';
    document.getElementById('resetSuccess').style.display = '';
    setTimeout(hideResetModal, 2500);
  } catch (e) {
    eShow('密码重置失败: ' + e);
    hideResetModal();
  }
}

_startTs = Date.now();
setTimeout(() => { chk(); _p = setInterval(chk, 3000); }, 900);
// 额外获取已保存的 IP 用于初始化
setTimeout(() => {
  fetch('http://localhost:3001/api/server-info').then(r => r.json()).then(info => {
    if (info.selectedIp) {
      const idx = _ifaces.findIndex(i => i.ip === info.selectedIp);
      if (idx >= 0 && idx !== _selIface) {
        _selIface = idx;
        renderUrls();
        const sel = document.getElementById('ifaceSelect');
        if (sel) sel.value = info.selectedIp;
      }
    }
  }).catch(() => {});
}, 2000);
</script>
</body>
