  useEffect(function() {
    if (screen === 'chat') {
      var tries = 0;
      function doScroll() {
        var area = messagesAreaRef.current;
        if (area) { area.scrollTop = area.scrollHeight; }
        if (tries < 10) { tries++; setTimeout(doScroll, 150); }
      }
      doScroll();
    }
  }, [screen]);

  // Detect speech recognition support (hide voice button on unsupported browsers)
  useEffect(function() {
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    setSpeechSupported(!!SR);
  }, []);


  // Auto-scroll when new messages arrive (only if at bottom)
  useEffect(function() {
    var area = messagesAreaRef.current;
    if (!area) return;
    var atBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 80;
    if (atBottom) {
      requestAnimationFrame(function() { area.scrollTop = area.scrollHeight; });
    }
  });

  // Deselect online student in identity
  useEffect(function() {
    if (screen === 'identity' && selectedStudent && onlineStudentIds[selectedStudent.id]) {
      setSelectedStudent(null);
    }
  }, [onlineStudentIds, screen]);

  // Init
  useEffect(function() {
    if (!code) { window.location.href = '/'; return; }
    loadClassroom();
    return function() {
      if (chatSocket.current) { chatSocket.current.disconnect(); chatSocket.current = null; }
      if (statusSocket.current) { statusSocket.current.disconnect(); statusSocket.current = null; }
    };
  }, []);

  function loadClassroom() {
    apiGet('/api/classroom/code/' + encodeURIComponent(code)).then(function(cr) {
      setClassroom(cr);
      if (cr.status === 'paused') setPaused(true);
      if (cr.id) connectStatusSocket(cr.id);
      var saved = loadSession();
      if (saved) {
        setSelectedStudent({ id: saved.studentId, name: saved.studentName });
        enterChat(cr, { id: saved.studentId, name: saved.studentName });
      } else {
        apiGet('/api/classroom/' + encodeURIComponent(cr.id) + '/students').then(function(stu) {
          setStudents(stu || []);
          setScreen('identity');
        }).catch(function() {
          setStudents([]);
          setScreen('identity');
        });
      }
    }).catch(function() {
      alert('互动码无效或课堂已结束');
      window.location.href = '/';
    });
  }

  function loadSession() {
    try {
      var raw = sessionStorage.getItem('chat_session_' + code);
      if (raw) { return JSON.parse(raw); }
    } catch(e) {}
    return null;
  }

  function saveSession(studentId, studentName) {
    try { sessionStorage.setItem('chat_session_' + code, JSON.stringify({ studentId: studentId, studentName: studentName })); } catch(e) {}
  }

  function clearSession() {
    sessionStorage.removeItem('chat_session_' + code);
  }

  function connectStatusSocket(classroomId) {
    if (typeof io === 'undefined') return;
    try {
      var s = io(API_BASE, { transports: ['polling', 'websocket'] });
      statusSocket.current = s;
      s.on('connect', function() { s.emit('listen-classroom-status', classroomId); });
      s.on('online-students', function(ids) {
        var map = {};
        for (var i = 0; i < ids.length; i++) map[ids[i]] = true;
        setOnlineStudentIds(map);
      });
    } catch(e) {}
  }

  function enterChat(cr, student) {
    var cid = cr && cr.id;
    var sid = student && student.id;
    if (cid && sid) {
      apiGet('/api/classroom/' + encodeURIComponent(cid) + '/student/' + encodeURIComponent(sid) + '/messages').then(function(msgs) {
        if (msgs && msgs.length > 0) {
          setMessages(msgs.map(function(m) {
            var item = { role: m.role, content: m.content, roundIndex: m.roundIndex };
            try {
              if (m.fileUrls) {
                item.fileUrls = typeof m.fileUrls === 'string' ? JSON.parse(m.fileUrls) : m.fileUrls;
                item.fileNames = typeof m.fileNames === 'string' ? JSON.parse(m.fileNames) : m.fileNames;
              }
            } catch(e) {}
            return item;
          }));
        }
      }).catch(function() {}).finally(function() {
        setScreen('chat');
        startChatSession(cr, student);
      });
    } else {
      setScreen('chat');
      startChatSession(cr, student);
    }
  }

  function startChatSession(cr, student) {
    if (chatSocket.current) { chatSocket.current.disconnect(); chatSocket.current = null; }
    setWaitingAI(false);
    setStreamingContent('');
    if (typeof io === 'undefined') {
      setConnected(false);
      setMessages(function(prev) { return prev.concat([{ role: 'system', content: '连接库加载失败，请刷新页面或更换浏览器重试' }]); });
      return;
    }
    var s = io(API_BASE, { transports: ['polling', 'websocket'], timeout: 15000 });
    chatSocket.current = s;
    var connTimeout = setTimeout(function() {
      if (!chatSocket.current || !chatSocket.current.connected) {
        setMessages(function(prev) { return prev.concat([{ role: 'system', content: '连接服务器超时，请检查网络后刷新重试' }]); });
      }
    }, 15000);
    s.on('connect', function() {
      clearTimeout(connTimeout);
      setConnected(true);
      s.emit('join-classroom', { classroomCode: code, studentId: student.id });
    });
    s.on('disconnect', function() { setConnected(false); });
    s.on('connect_error', function() { setConnected(false); });
    s.on('ai-response', function(data) {
      setMessages(function(prev) { return prev.concat([{ role: 'assistant', content: data.content, roundIndex: data.roundIndex }]); });
      setWaitingAI(false);
      setStreamingContent('');
      setTimeout(function() { focusInput(); }, 100);
    });
    s.on('ai-thinking', function() { setWaitingAI(true); setStreamingContent(''); });
    s.on('ai-chunk', function(data) { setStreamingContent(function(prev) { return prev + data.content; }); });
    s.on('ai-error', function(data) {
      setWaitingAI(false);
      setMessages(function(prev) { return prev.concat([{ role: 'system', content: '⚠️ ' + data.error }]); });
    });
    s.on('agent-disabled', function() {
      setWaitingAI(false);
      setMessages(function(prev) { return prev.concat([{ role: 'system', content: '暂无法回复，请稍后再试或联系老师' }]); });
    });
    s.on('identity-conflict', function(data) {
      setMessages(function(prev) { return prev.concat([{ role: 'system', content: '⚠️ ' + data.error }]); });
      setWaitingAI(false);
      setConnected(false);
      clearSession();
      setTimeout(function() {
        if (chatSocket.current) { chatSocket.current.disconnect(); chatSocket.current = null; }
        setSelectedStudent(null);
        setMessages([]);
        setScreen('identity');
      }, 2500);
    });
    s.on('classroom-ended', function() { alert('课堂已结束'); window.location.href = '/'; });
    s.on('classroom-paused', function() {
      setPaused(true);
      setWaitingAI(false);
      setStreamingContent('');
      setMessages(function(prev) { return prev.concat([{ role: 'system', content: '课堂已暂停，请等待老师继续' }]); });
    });
    s.on('classroom-resumed', function() {
      setPaused(false);
      setMessages(function(prev) { return prev.concat([{ role: 'system', content: '课堂已恢复，可以继续提问了' }]); });
    });
  }

  function focusInput() {
    if (inputRef.current && !paused) {
      if (isIOS()) {
        inputRef.current.readOnly = true;
        inputRef.current.focus();
        setTimeout(function() { if (inputRef.current) inputRef.current.readOnly = false; }, 150);
      } else {
        inputRef.current.focus();
      }
    }
  }

  function sendMessage() {
    var text = inputText.trim();
    var files = attachedFiles;
    if (!text && files.length === 0) return;
    if (waitingAI || paused) return;
    if (!chatSocket.current || !connected) {
      setMessages(function(prev) { return prev.concat([{ role: 'system', content: '⚠️ 尚未连接到服务器，请稍候或刷新重试' }]); });
      return;
    }
    if (!selectedStudent) {
      setMessages(function(prev) { return prev.concat([{ role: 'system', content: '⚠️ 连接异常，请刷新页面重新选择身份' }]); });
      return;
    }
    setInputText('');
    var snapshot = files.slice();
    setAttachedFiles([]);
    setMessages(function(prev) { return prev.concat([{ role: 'user', content: text || '(附件)', fileUrls: snapshot.map(function(f) { return f.url; }), fileNames: snapshot.map(function(f) { return f.name; }) }]); });
    chatSocket.current.emit('send-message', {
      classroomCode: code,
      studentId: selectedStudent.id,
      content: text || '',
      fileUrls: snapshot.map(function(f) { return f.url; }),
      fileNames: snapshot.map(function(f) { return f.name; })
    });
  }

  function handleSelectStudent(student) {
    if (screen !== 'identity' || onlineStudentIds[student.id]) return;
    setSelectedStudent(student);
  }

  function handleConfirmIdentity() {
    if (!selectedStudent) return;
    saveSession(selectedStudent.id, selectedStudent.name);
    enterChat(classroom, selectedStudent);
  }

  function handleSwitchIdentity() {
    if (chatSocket.current) { chatSocket.current.disconnect(); chatSocket.current = null; }
    clearSession();
    setMessages([]);
    setSelectedStudent(null);
    setScreen('identity');
    // 重新加载学生列表（有缓存 session 时首次可能未加载）
    if (classroom && classroom.id) {
      apiGet('/api/classroom/' + encodeURIComponent(classroom.id) + '/students').then(function(stu) {
        setStudents(stu || []);
      }).catch(function() {
        setStudents([]);
      });
    }
  }

  function handleExit() {
    clearSession();
    if (chatSocket.current) chatSocket.current.disconnect();
    if (statusSocket.current) statusSocket.current.disconnect();
    window.location.href = '/';
  }

  function handleBack() {
    clearSession();
    if (statusSocket.current) statusSocket.current.disconnect();
    window.location.href = '/';
  }

  function handleFileSelect() {
    var fi = fileInputRef.current;
    if (!fi || !fi.files || fi.files.length === 0) return;
    setUploading(true);
    var fileList = Array.from(fi.files);
    var newFiles = [];
    function uploadNext(index) {
      if (index >= fileList.length) {
        setUploading(false);
        setAttachedFiles(function(prev) { return prev.concat(newFiles); });
        fi.value = '';
        return;
      }
      var form = new FormData();
      form.append('file', fileList[index]);
      var xhr = new XMLHttpRequest();
      xhr.open('POST', API_BASE + '/api/upload', true);
      xhr.onload = function() {
        if (xhr.status >= 200 && xhr.status < 300) {
          try { var d = JSON.parse(xhr.responseText); if (d.success) newFiles.push({ url: d.url, name: fileList[index].name }); } catch(e) {}
        }
        uploadNext(index + 1);
      };
      xhr.onerror = function() { uploadNext(index + 1); };
      xhr.send(form);
    }
    uploadNext(0);
  }

  function handleCameraCapture() {
    var ci = cameraInputRef.current;
    if (!ci || !ci.files || ci.files.length === 0) return;
    setUploading(true);
    var file = ci.files[0];
    var form = new FormData();
    form.append('file', file);
    var xhr = new XMLHttpRequest();
    xhr.open('POST', API_BASE + '/api/upload', true);
    xhr.onload = function() {
      setUploading(false);
      ci.value = '';
      if (xhr.status >= 200 && xhr.status < 300) {
        try { var d = JSON.parse(xhr.responseText); if (d.success) setAttachedFiles(function(prev) { return prev.concat([{ url: d.url, name: file.name }]); }); } catch(e) {}
      }
    };
    xhr.onerror = function() { setUploading(false); ci.value = ''; };
    xhr.send(form);
  }

  function removeFile(index) {
    setAttachedFiles(function(prev) { var c = prev.slice(); c.splice(index, 1); return c; });
  }

  function startVoiceInput() {
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      setMessages(function(prev) { return prev.concat([{ role: 'system', content: '您的浏览器不支持语音输入' }]); });
      return;
    }
    // 先请求麦克风权限，再启动语音识别
    function doStart() {
      var recognition = new SR();
      recognition.lang = 'zh-CN';
      recognition.continuous = false;
      recognition.interimResults = false;
      var vb = document.getElementById('voiceBtn');
      recognition.onstart = function() { if (vb) vb.classList.add('listening'); };
      recognition.onend = function() { if (vb) vb.classList.remove('listening'); };
      recognition.onresult = function(event) { setInputText(function(prev) { return prev + event.results[0][0].transcript; }); };
      recognition.onerror = function(e) {
        if (vb) vb.classList.remove('listening');
        setMessages(function(prev) { return prev.concat([{ role: 'system', content: '语音识别失败: ' + (e.message || e.error || '未知错误') }]); });
      };
      try { recognition.start(); } catch(e) {
        setMessages(function(prev) { return prev.concat([{ role: 'system', content: '语音启动失败，请确保已授予麦克风权限' }]); });
      }
      focusInput();
    }
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
        stream.getTracks().forEach(function(t) { t.stop(); });
        doStart();
      }).catch(function() {
        setMessages(function(prev) { return prev.concat([{ role: 'system', content: '请在浏览器地址栏左侧点击锁定图标，将麦克风权限改为"允许"后重试' }]); });
      });
    } else {
      doStart();
    }
  }

  function handleScroll() {
    var area = messagesAreaRef.current;
    if (!area) return;
    var atBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 80;
    setShowScrollBtn(!atBottom);
  }

  function handleScrollToBottom() {
    var area = messagesAreaRef.current;
    if (area) { area.scrollTop = area.scrollHeight; }
    setShowScrollBtn(false);
  }

  // ====== Render ======

  // Loading screen
  if (screen === 'loading') {
    return html`<div class="loading-screen"><div class="spinner"><div class="loading-dots"><span></span><span></span><span></span></div><div class="spinner-text">正在连接课堂...</div><div class="spinner-code">互动码: ${escapeHtml(code)}</div></div></div>`;
  }

  // Identity screen
  if (screen === 'identity') {
    var sorted = [].concat(students).sort(function(a, b) {
      return (parseInt(a.studentNo) || 0) - (parseInt(b.studentNo) || 0);
    });
    var studentItems = sorted.map(function(s) {
      var online = !!onlineStudentIds[s.id];
      var sel = selectedStudent && selectedStudent.id === s.id;
      var cls = 'student-item' + (online ? ' online' : '') + (sel ? ' selected' : '');
      return html`<button class="${cls}" disabled=${online} onClick=${function() { handleSelectStudent(s); }}>
        <div class="student-avatar" style="background:${online ? '#e5e7eb' : '#f3f4f6'};color:${online ? '#d1d5db' : '#6b7280'}">${escapeHtml((s.name || '?')[0])}</div>
        <div class="info">
          ${s.studentNo ? html`<div class="no">${escapeHtml(s.studentNo)}</div>` : null}
          <div class="name">${escapeHtml(s.name)}</div>
        </div>
        ${online ? html`<span class="online-badge">已登录</span>` : null}
      </button>`;
    });
    return html`<div class="identity-screen">
      <button class="exit-btn" onClick=${handleBack}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12" /><polyline points="12 19 5 12 12 5" /></svg>退出
      </button>
      <div class="identity-card">
        <div class="identity-header">
          <div class="label">${isGroupMode ? '选择你的小组' : '选择你的身份'}</div>
          <h1>${isGroupMode ? '请选择你的小组' : '请选择你的姓名'}</h1>
          ${classroom && classroom.title ? html`<div class="title">${escapeHtml(classroom.title)}</div>` : null}
        </div>
        <div class="student-list">${studentItems}</div>
        <button class="confirm-btn" disabled=${!selectedStudent} onClick=${handleConfirmIdentity}>${isGroupMode ? '确认并进入小组对话' : '确认并进入对话'}</button>
      </div>
    </div>`;
  }

  // Chat screen
  var msgVNodes = [];
  for (var mi = 0; mi < messages.length; mi++) {
    msgVNodes.push(renderMessage(messages[mi], agent, agentName));
  }

  var emptyContent = null;
  if (messages.length === 0 && !waitingAI) {
    emptyContent = html`<div class="empty-state">
      <div class="avatar-wrap"><${AgentAvatar} agent=${agent} size=${80} borderRadius=${24} fontSize=${40} /></div>
      ${agentEnabled ? html`<h2>${escapeHtml(agentName)}</h2><p>${agent && agent.greeting ? agent.greeting.split('\n').map(function(line, i) { return [i > 0 ? html`<br />` : null, escapeHtml(line)]; }) : html`你好呀！我是你的 AI 学习助手 🎉<br>有什么问题尽管问我，也可以上传图片让我帮你评价哦！`}</p>` :
        html`<div class="disabled-notice"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>智能体已被教师停用，暂时无法回复消息</div>`}
    </div>`;
  }

  var thinkingContent = null;
  if (waitingAI) {
    thinkingContent = html`<div class="thinking-bubble">
      <div class="sender">
        <div class="av"><${AgentAvatar} agent=${agent} size=${26} borderRadius=${8} fontSize=${13} /></div>
        <span class="sn">${escapeHtml(agentName)}</span>
      </div>
      <div class="thinking-content">
        ${streamingContent ? html`<div><div class="markdown-content" dangerouslySetInnerHTML=${{__html: renderMarkdown(stripImages(streamingContent))}} /><span class="cursor-blink"></span></div>` : html`<div class="thinking-dots"><span></span><span></span><span></span></div>`}
      </div>
    </div>`;
  }

  var filesContent = null;
  if (attachedFiles.length > 0) {
    var fileThumbs = attachedFiles.map(function(f, idx) {
      return html`<div class="file-thumb">
        ${isImageFile(f.url) ? html`<img src="${API_BASE}${f.url}" alt="${escapeHtml(f.name)}" />` :
          html`<div class="file-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg><span>${escapeHtml(f.name)}</span></div>`}
        <button class="remove-file" onClick=${function() { removeFile(idx); }}>✕</button>
      </div>`;
    });
    filesContent = html`<div class="file-previews">${fileThumbs}</div>`;
  }

  var canSend = (inputText.trim().length > 0 || attachedFiles.length > 0) && !waitingAI && !paused && connected && !!chatSocket.current;

  return html`<div class="chat-screen">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="avatar-wrap"><${AgentAvatar} agent=${agent} size=${42} borderRadius=${12} fontSize=${20} /></div>
        <div>
          <div class="agent-name">${escapeHtml(agentName)}</div>
          ${classroom && classroom.title ? html`<div class="agent-title">${escapeHtml(classroom.title)}</div>` : null}
        </div>
      </div>
      <div class="chat-header-right">
        <span class="status-indicator ${connected ? 'status-online' : 'status-offline'}">${connected ? '已连接' : '连接断开'}</span>
        ${selectedStudent ? html`<div class="user-tag"><div class="initial">${escapeHtml(selectedStudent.name[0])}</div>${escapeHtml(selectedStudent.name)}</div>` : null}
        <button class="header-btn" onClick=${handleSwitchIdentity}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg>切换
        </button>
        <button class="header-btn" onClick=${handleExit}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>退出
        </button>
      </div>
    </div>
    <div class="messages-area" ref=${messagesAreaRef} onScroll=${handleScroll}>
      ${!connected ? html`<div style="flex-shrink:0;text-align:center;padding:8px 16px;font-size:13px;border-radius:8px;margin:8px 0 0;background:#fef2f2;color:#ef4444;border:1px solid #fecaca">⚠️ 连接断开，正在重连...</div>` : null}
      ${emptyContent}
      ${msgVNodes}
      ${thinkingContent}
    </div>
    ${showScrollBtn ? html`<button class="scroll-btn" onClick=${handleScrollToBottom}>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>` : null}
    <div class="input-area">
      ${paused ? html`<div class="paused-notice">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>课堂已暂停，等待老师继续...
      </div>` : null}
      ${filesContent}
      <div class="input-toolbar">
        <input type="file" multiple accept="image/*,.pdf,.doc,.docx,.txt" style="display:none" ref=${fileInputRef} onChange=${handleFileSelect} />
        <input type="file" accept="image/*" capture="environment" style="display:none" ref=${cameraInputRef} onChange=${handleCameraCapture} />
        <button class="tool-btn" disabled=${waitingAI || uploading || paused} onClick=${function() { if (fileInputRef.current) fileInputRef.current.click(); }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <button class="tool-btn" disabled=${waitingAI || uploading || paused} onClick=${function() { if (cameraInputRef.current) cameraInputRef.current.click(); }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
        ${speechSupported ? html`<button class="tool-btn" id="voiceBtn" onClick=${startVoiceInput}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>` : null}
        <div class="input-wrap">
          <input type="text" placeholder="${paused ? '课堂已暂停...' : '输入你的问题...'}" disabled=${paused} autocomplete="off"
            ref=${inputRef}
            value=${inputText}
            onInput=${function(e) { setInputText(e.target.value); }}
            onKeyDown=${function(e) { if (e.key === 'Enter' && !paused) sendMessage(); }} />
          <button class="send-btn ${canSend ? 'active' : 'inactive'}" disabled=${!canSend} onClick=${sendMessage}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderMessage(msg, agt, aName) {
  if (msg.role === 'system') {
    return html`<div class="msg-row"><div class="msg-bubble system">${escapeHtml(msg.content)}</div></div>`;
  }
  if (msg.role === 'user') {
    var content = [];
    if (msg.fileUrls && msg.fileUrls.length > 0) {
      for (var fi = 0; fi < msg.fileUrls.length; fi++) {
        var fu = msg.fileUrls[fi];
        var fn = (msg.fileNames && msg.fileNames[fi]) || '';
        if (isImageFile(fu)) {
          content.push(html`<div class="msg-bubble user"><div class="file-preview"><img src="${API_BASE}${fu}" alt="${escapeHtml(fn)}" /></div>${escapeHtml(msg.content || '(附件)')}</div>`);
        } else {
          content.push(html`<div class="msg-bubble user"><div class="file-preview"><div class="file-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>${escapeHtml(fn || '文件')}</div></div>${escapeHtml(msg.content || '(附件)')}</div>`);
        }
      }
    } else {
      content.push(html`<div class="msg-bubble user">${escapeHtml(msg.content)}</div>`);
    }
    return html`<div class="msg-row user">${content}</div>`;
  }
  if (msg.role === 'assistant') {
    return html`<div class="msg-row">
      <div class="sender">
        <div class="av"><${AgentAvatar} agent=${agt} size=${34} borderRadius=${10} fontSize=${16} /></div>
        <span class="sn">${escapeHtml(aName)}</span>
      </div>
      <div class="msg-bubble ai"><${MarkdownContent} content=${msg.content} /></div>
    </div>`;
  }
  return null;
}

render(h(App), document.getElementById('app'));
</script>

</body>
</html>
