<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>AI互动课堂</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    touch-action: manipulation;
    padding: 24px;
  }
  .container { text-align: center; max-width: 480px; width: 100%; position: relative; }
  .logo {
    width: 72px; height: 72px; border-radius: 20px;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px; font-size: 36px; font-weight: 700; color: white;
  }
  h1 { color: white; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .subtitle { color: rgba(255,255,255,0.6); font-size: 15px; margin-bottom: 48px; }
  .code-inputs { display: flex; justify-content: center; margin-bottom: 24px; }
  .code-inputs input {
    width: 64px; max-width: 64px; height: 76px; flex-shrink: 0;
    margin: 0 6px;
    font-size: 32px; font-weight: 700;
    border-radius: 12px; border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.15); color: white;
    text-align: center; outline: none; caret-color: white;
    -webkit-appearance: none; appearance: none;
  }
  .code-inputs input:focus {
    border-color: white;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.25);
  }
  .error { color: #fca5a5; font-size: 14px; margin-bottom: 16px; min-height: 20px; }
  .submit-btn {
    background: white; color: #667eea; font-weight: 600; font-size: 16px;
    padding: 14px 40px; border-radius: 12px; border: none;
    cursor: pointer; opacity: 1;
  }
  .submit-btn:disabled { opacity: 0.5; cursor: default; }
  .teacher-link {
    position: absolute; bottom: -60px; right: 0;
    background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 6px 14px; border-radius: 6px; font-size: 12px;
    text-decoration: none;
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo">AI</div>
  <h1>AI互动课堂</h1>
  <p class="subtitle">请输入老师下发的4位互动码</p>

  <form id="codeForm" action="/classroom" method="get">
    <div class="code-inputs">
      <input type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-index="0">
      <input type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-index="1">
      <input type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-index="2">
      <input type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-index="3">
    </div>
    <input type="hidden" name="code" id="codeHidden">

    <p class="error" id="errorMsg"></p>

    <button type="submit" class="submit-btn" id="submitBtn">进入课堂</button>
  </form>

  <a href="/teacher" class="teacher-link">教师入口</a>
</div>

<script>
(function() {
  const inputs = document.querySelectorAll('.code-inputs input');
  const hidden = document.getElementById('codeHidden');
  const error = document.getElementById('errorMsg');
  const btn = document.getElementById('submitBtn');
  const form = document.getElementById('codeForm');

  function getCode() {
    let code = '';
    inputs.forEach(inp => code += inp.value.replace(/\D/g, ''));
    return code;
  }

  function updateHidden() {
    hidden.value = getCode();
    const full = hidden.value.length === 4;
    btn.disabled = !full;
    btn.style.opacity = full ? '1' : '0.5';
  }

  inputs.forEach((inp, i) => {
    inp.addEventListener('input', function(e) {
      const val = this.value.replace(/\D/g, '').slice(0, 1);
      this.value = val;
      error.textContent = '';
      updateHidden();
      if (val && i < 3) {
        inputs[i + 1].focus();
      }
    });

    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace') {
        if (!this.value && i > 0) {
          inputs[i - 1].focus();
        }
      }
    });

    inp.addEventListener('focus', function() {
      this.select();
    });
  });

  // 粘贴支持
  form.addEventListener('paste', function(e) {
    const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 4);
    if (!pasted) return;
    e.preventDefault();
    inputs.forEach((inp, i) => { inp.value = pasted[i] || ''; });
    updateHidden();
    if (pasted.length === 4) {
      form.submit();
    } else {
      inputs[pasted.length]?.focus();
    }
  });

  // 提交后直接跳到课堂页面，验证由 classroom 页面处理
  form.addEventListener('submit', function(e) {
    const code = getCode();
    if (code.length !== 4) {
      e.preventDefault();
      error.textContent = '请输入完整的4位互动码';
      return;
    }
    // 不做 API 预验证，直接提交 → classroom 页面会读取 URL 中的 code
    btn.disabled = true;
    btn.textContent = '进入中...';
  });

  updateHidden();
})();
</script>
</body>
</html>
