<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>教师登录 · AI互动课堂</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    touch-action: manipulation;
    padding: 24px;
  }
  .card {
    background: white; border-radius: 20px; padding: 40px;
    max-width: 380px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .logo {
    width: 48px; height: 48px; border-radius: 14px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 22px;
    margin: 0 auto 16px;
  }
  h1 { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 6px; }
  .desc { color: #6b7280; font-size: 14px; text-align: center; margin-bottom: 28px; }
  .input {
    width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0;
    border-radius: 8px; font-size: 14px; outline: none;
    transition: border-color 0.15s; box-sizing: border-box;
  }
  .input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  .form-group { margin-bottom: 12px; }
  .error-text {
    font-size: 12px; color: #ef4444; margin-top: 4px;
    display: flex; align-items: center; gap: 4px;
  }
  .submit-btn {
    width: 100%; padding: 12px 28px; border-radius: 8px;
    font-size: 15px; font-weight: 500; border: none;
    background: #2563eb; color: white; cursor: pointer;
    transition: background 0.15s;
  }
  .submit-btn:hover { background: #1d4ed8; }
  .submit-btn:disabled { opacity: 0.6; cursor: default; }
  .back-link {
    display: block; text-align: center; margin-top: 16px;
    color: #6b7280; font-size: 13px; text-decoration: none;
  }
  .back-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">AI</div>
  <h1>教师身份验证</h1>
  <p class="desc">请输入管理密码以进入控制台</p>

  <div id="loginForm">
    <div class="form-group">
      <input type="password" id="passwordInput" class="input" placeholder="管理密码" autocomplete="current-password" autofocus>
      <div id="errorMsg" class="error-text" style="display:none"></div>
    </div>
    <button id="loginBtn" class="submit-btn" onclick="handleLogin()">进入控制台</button>
  </div>

  <a href="/" class="back-link">返回学生页面</a>
</div>

<script>
var BACKEND_PORT = 3001;
var API_BASE = 'http://' + window.location.hostname + ':' + BACKEND_PORT;

var pwdInput = document.getElementById('passwordInput');
var errorMsg = document.getElementById('errorMsg');
var loginBtn = document.getElementById('loginBtn');

pwdInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleLogin();
});

pwdInput.addEventListener('input', function() {
  errorMsg.style.display = 'none';
});

function handleLogin() {
  var pwd = pwdInput.value;
  if (!pwd) {
    showError('请输入管理密码');
    return;
  }
  loginBtn.disabled = true;
  loginBtn.textContent = '验证中...';
  errorMsg.style.display = 'none';

  var xhr = new XMLHttpRequest();
  xhr.open('POST', API_BASE + '/api/settings/verify-password', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.timeout = 10000;
  xhr.onload = function() {
    loginBtn.disabled = false;
    loginBtn.textContent = '进入控制台';
    if (xhr.status === 200) {
      try {
        var resp = JSON.parse(xhr.responseText);
        if (resp.verified) {
          // 保存 session（与 React 版一致）
          try {
            localStorage.setItem('teacher_session', JSON.stringify({
              verified: true,
              timestamp: Date.now()
            }));
          } catch(_) {}
          // 跳转到教师控制台
          window.location.href = '/teacher/dashboard';
        } else {
          showError('密码错误');
        }
      } catch(_) {
        showError('验证失败');
      }
    } else {
      try {
        var errResp = JSON.parse(xhr.responseText);
        showError(errResp.error || '验证失败');
      } catch(_) {
        showError('验证失败（' + xhr.status + '）');
      }
    }
  };
  xhr.onerror = function() {
    loginBtn.disabled = false;
    loginBtn.textContent = '进入控制台';
    showError('无法连接服务器');
  };
  xhr.ontimeout = function() {
    loginBtn.disabled = false;
    loginBtn.textContent = '进入控制台';
    showError('连接超时');
  };
  xhr.send(JSON.stringify({ password: pwd }));
}

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.style.display = 'flex';
}
</script>
</body>
</html>
